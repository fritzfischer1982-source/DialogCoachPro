<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - Lehrer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; padding-bottom: 80px; }
        .section-card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 1.5rem; transition: transform 0.2s; }
        .input-premium { border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.75rem; width: 100%; transition: all 0.2s; }
        .input-premium:focus { border-color: #4F46E5; ring: 2px solid #4F46E5; outline: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #C7D2FE; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #818CF8; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-8 sticky top-0 bg-[#f3f4f6] z-10 py-4 border-b border-gray-200">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">DialogCoach <span class="text-indigo-600">Pro</span></h1>
                <p class="text-gray-500 text-sm">Erstellen Sie hochpersonalisierte Lernszenarien.</p>
            </div>
            <div class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide">
                <i class="fas fa-crown mr-1 text-yellow-500"></i> Premium Teacher
            </div>
        </div>

        <form id="configForm" onsubmit="event.preventDefault(); generateStudentLink();">

        <!-- 1. KI & Audio Engine -->
        <div class="section-card border-l-4 border-indigo-500">
            <h2 class="text-xl font-bold mb-4 flex items-center text-gray-800"><i class="fas fa-microchip w-8 text-indigo-500"></i> Engine Konfiguration</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Links: KI Modell -->
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-gray-700">KI Modell (LLM)</label>
                    <select id="aiModel" class="input-premium bg-gray-50 font-medium" onchange="toggleCustomModel()">
                        <option value="gpt-4o">GPT-4o (Empfohlen - Beste Qualität)</option>
                        <option value="gpt-4-turbo">GPT-4 Turbo</option>
                        <option value="gpt-3.5-turbo">GPT-3.5 Turbo (Sehr schnell/günstig)</option>
                        <option value="custom">Benutzerdefiniert...</option> 
                    </select>
                    
                    <div id="customModelField" class="hidden">
                        <input type="text" id="customModelName" class="input-premium border-indigo-300 bg-indigo-50" placeholder="Modell ID (z.B. gpt-5-preview)">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">OpenAI API Key <span class="text-red-500">*</span></label>
                        <div class="flex gap-2">
                            <input type="password" id="apiKey" class="input-premium" placeholder="sk-..." required>
                            <button type="button" onclick="testConnection()" class="bg-gray-800 text-white px-4 py-2 rounded-lg hover:bg-gray-900 whitespace-nowrap shadow-md transition transform active:scale-95">
                                <i class="fas fa-plug mr-2"></i>Test
                            </button>
                        </div>
                        <p id="connectionStatus" class="text-xs mt-2 h-4 transition-all duration-300"></p>
                    </div>
                </div>

                <!-- Rechts: Audio Engine -->
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-gray-700">Sprachausgabe (TTS)</label>
                    <select id="audioEngine" class="input-premium bg-gray-50 font-medium" onchange="toggleAudioSettings()">
                        <option value="browser">Browser Native (Standard)</option>
                        <option value="openai">OpenAI HD (Premium Qualität)</option>
                        <option value="elevenlabs">ElevenLabs (Ultra Realistisch)</option>
                    </select>

                    <!-- OpenAI Voice Settings -->
                    <div id="openaiVoiceSettings" class="hidden p-3 bg-gray-50 rounded-lg border border-gray-200">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Stimme Wählen</label>
                        <select id="openaiVoice" class="w-full text-sm border-gray-300 rounded p-1.5 focus:ring-indigo-500 focus:border-indigo-500">
                            <option value="alloy">Alloy (Neutral)</option>
                            <option value="echo">Echo (Männlich/Tief)</option>
                            <option value="fable">Fable (Britisch angehaucht)</option>
                            <option value="onyx">Onyx (Sehr tief/Männlich)</option>
                            <option value="nova">Nova (Weiblich/Energisch)</option>
                            <option value="shimmer">Shimmer (Weiblich/Klar)</option>
                        </select>
                    </div>

                    <!-- ElevenLabs Settings -->
                    <div id="elevenLabsSettings" class="hidden p-3 bg-gray-50 rounded-lg border border-gray-200 space-y-2">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">ElevenLabs Setup</label>
                        <input type="text" id="elevenApiKey" class="w-full text-sm border border-gray-300 rounded p-2 focus:ring-indigo-500" placeholder="ElevenLabs API Key">
                        <input type="text" id="elevenVoiceId" class="w-full text-sm border border-gray-300 rounded p-2 focus:ring-indigo-500" placeholder="Voice ID (z.B. 21m00Tcm4TlvDq8ikWAM)">
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. Szenario & Rolle -->
        <div class="section-card">
            <h2 class="text-xl font-bold mb-4 flex items-center text-gray-800"><i class="fas fa-theater-masks w-8 text-pink-500"></i> Szenario & Rolle</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Thema der Stunde</label>
                    <input type="text" id="topic" class="input-premium" placeholder="z.B. Gehaltsverhandlung" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Rolle des Gesprächspartners (Freitext)</label>
                    <input type="text" id="roleDesc" class="input-premium" placeholder="z.B. Strenger Chef, Geduldige Oma..." required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Niveau (GER)</label>
                    <select id="level" class="input-premium">
                        <option value="A1">A1 (Anfänger)</option>
                        <option value="A2">A2 (Grundlagen)</option>
                        <option value="B1">B1 (Mittelstufe)</option>
                        <option value="B2">B2 (Fortgeschritten)</option>
                        <option value="C1">C1 (Fachkundig)</option>
                        <option value="C2">C2 (Muttersprachler)</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Intro-Text (Wird beim Start vorgelesen)</label>
                <textarea id="introText" rows="2" class="input-premium" placeholder="Hallo! Heute üben wir...">Hallo! Ich bin dein Coach. Heute simulieren wir eine Gehaltsverhandlung. Bist du bereit?</textarea>
            </div>
        </div>

        <!-- 3. Fragen Generator -->
        <div class="section-card">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold flex items-center text-gray-800"><i class="fas fa-list-ol w-8 text-blue-500"></i> Fragen (Ablauf)</h2>
            </div>
            
            <div id="questionsContainer" class="space-y-3 mb-4 max-h-[400px] overflow-y-auto pr-2">
                <!-- Fragen werden hier generiert -->
            </div>
            
            <div class="flex gap-4 border-t pt-4 border-gray-100 items-center">
                <button type="button" onclick="addQuestion()" class="text-indigo-600 font-bold hover:text-indigo-800 text-sm flex items-center"><i class="fas fa-plus-circle mr-2"></i> Frage hinzufügen</button>
                
                <div class="ml-auto flex items-center gap-2">
                    <input type="number" id="questionCount" min="1" max="10" value="5" class="w-16 border rounded text-center text-sm" title="Anzahl Fragen">
                    <button type="button" onclick="generateAIQuestions()" class="text-green-600 font-bold hover:text-green-800 text-sm flex items-center bg-green-50 px-3 py-1 rounded border border-green-200"><i class="fas fa-magic mr-2"></i> KI Vorschläge Generieren</button>
                </div>
            </div>
        </div>

        <!-- 4. Lernhilfen & Gamification -->
        <div class="section-card">
            <h2 class="text-xl font-bold mb-4 flex items-center text-gray-800"><i class="fas fa-life-ring w-8 text-green-500"></i> Hilfen & Gamification</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Links: Content -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Pflichtvokabeln (Kommagetrennt)</label>
                        <textarea id="vocabList" rows="3" class="input-premium" placeholder="Nachhaltigkeit, Effizienz, Synergie..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Redemittel (Spickzettel)</label>
                        <textarea id="scaffoldList" rows="3" class="input-premium" placeholder="Ich bin der Meinung..., Meiner Ansicht nach..., Das ist ein wichtiger Punkt..."></textarea>
                        <p class="text-xs text-gray-400 mt-1">Jede Zeile ein neuer Punkt.</p>
                    </div>
                </div>

                <!-- Rechts: Einstellungen -->
                <div class="space-y-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <!-- Timer -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 flex justify-between">
                            <span>Zeit pro Frage</span>
                            <span id="timerValue" class="text-indigo-600 bg-indigo-100 px-2 rounded">60s</span>
                        </label>
                        <input type="range" id="questionTimer" min="30" max="300" step="10" value="60" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" oninput="document.getElementById('timerValue').textContent = this.value + 's'">
                    </div>

                    <!-- Gamification & Modus -->
                    <div class="space-y-4 pt-2 border-t border-gray-200">
                        <div class="flex items-center justify-between">
                            <span class="text-sm font-medium text-gray-700">Ansicht:</span>
                            <select id="studentViewMode" class="text-sm border-gray-300 rounded p-1 bg-white focus:ring-indigo-500">
                                <option value="learning">Lern-Modus (Sichtbar)</option>
                                <option value="exam">Prüfungs-Modus (Blind)</option>
                            </select>
                        </div>
                        
                        <label class="flex items-center space-x-3 cursor-pointer">
                            <input type="checkbox" id="gamificationEnabled" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded" checked>
                            <span class="text-gray-700 text-sm">Gamification (Wörter leuchten grün)</span>
                        </label>
                        
                        <label class="flex items-center space-x-3 cursor-pointer">
                            <input type="checkbox" id="aiFollowUp" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                            <span class="text-gray-700 text-sm">KI hakt bei kurzen Antworten nach</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Action -->
        <div class="sticky bottom-4 z-20">
            <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 rounded-xl shadow-xl transition transform hover:scale-[1.01] flex justify-center items-center text-lg ring-4 ring-white">
                <i class="fas fa-rocket mr-3"></i> Schüler-Link Erstellen
            </button>
        </div>

        <!-- Result Area -->
        <div id="resultArea" class="hidden mt-6 bg-green-50 p-6 rounded-xl border border-green-200 shadow-sm animate-fade-in">
            <h3 class="text-green-800 font-bold mb-2 flex items-center"><i class="fas fa-check-circle mr-2"></i> Session bereit!</h3>
            <div class="flex items-center gap-2 bg-white p-2 rounded border border-green-300">
                <input type="text" id="studentLink" readonly class="flex-1 text-sm text-gray-600 font-mono outline-none bg-transparent select-all" value="...">
                <button type="button" onclick="copyLink()" class="bg-green-100 text-green-700 px-4 py-2 rounded font-bold hover:bg-green-200 transition text-sm uppercase tracking-wide">Kopieren</button>
                <a id="openLinkBtn" href="#" target="_blank" class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded font-bold hover:bg-indigo-200 transition text-sm uppercase tracking-wide"><i class="fas fa-external-link-alt mr-1"></i> Öffnen</a>
            </div>
        </div>

        </form>
    </div>

    <!-- LOGIC -->
    <script>
        // Initiale Frage
        addQuestion("Erzählen Sie mir bitte kurz etwas über sich.");

        function toggleCustomModel() {
            const select = document.getElementById('aiModel');
            const customField = document.getElementById('customModelField');
            if(select.value === 'custom') {
                customField.classList.remove('hidden');
            } else {
                customField.classList.add('hidden');
            }
        }

        function toggleAudioSettings() {
            const engine = document.getElementById('audioEngine').value;
            const openAiSettings = document.getElementById('openaiVoiceSettings');
            const elevenSettings = document.getElementById('elevenLabsSettings');

            if (engine === 'openai') {
                openAiSettings.classList.remove('hidden');
                elevenSettings.classList.add('hidden');
            } else if (engine === 'elevenlabs') {
                openAiSettings.classList.add('hidden');
                elevenSettings.classList.remove('hidden');
            } else {
                openAiSettings.classList.add('hidden');
                elevenSettings.classList.add('hidden');
            }
        }

        function testConnection() {
            const apiKey = document.getElementById('apiKey').value;
            const status = document.getElementById('connectionStatus');
            
            if(!apiKey) {
                status.innerHTML = '<span class="text-red-500">❌ Bitte Key eingeben!</span>';
                return;
            }

            status.innerHTML = '<span class="text-gray-500"><i class="fas fa-sync fa-spin"></i> Prüfe...</span>';
            
            // Simulierter Ping
            setTimeout(() => {
                if(apiKey.startsWith('sk-')) {
                   status.innerHTML = '<span class="text-green-600 font-bold"><i class="fas fa-check-circle"></i> Verbindung OK!</span>';
                } else {
                   status.innerHTML = '<span class="text-red-500 font-bold">⚠️ Ungültiges Format (muss mit sk- beginnen)</span>';
                }
            }, 800);
        }

        function addQuestion(text = "") {
            const container = document.getElementById('questionsContainer');
            const id = Date.now();
            const html = `
                <div class="flex gap-2 items-center bg-gray-50 p-2 rounded border border-gray-200 group hover:border-indigo-300 transition mb-2" id="q-${id}">
                    <span class="text-gray-400 font-mono text-xs w-6">Q:</span>
                    <input type="text" value="${text}" class="question-input flex-1 bg-transparent border-none text-sm focus:ring-0 focus:outline-none placeholder-gray-400" placeholder="Frage eingeben...">
                    <div class="opacity-0 group-hover:opacity-100 flex gap-2 transition">
                         <button type="button" onclick="removeQuestion('q-${id}')" class="text-red-400 hover:text-red-600 p-1"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }

        function removeQuestion(id) {
            document.getElementById(id).remove();
        }

        async function generateAIQuestions() {
            const topic = document.getElementById('topic').value;
            const role = document.getElementById('roleDesc').value;
            const level = document.getElementById('level').value;
            const apiKey = document.getElementById('apiKey').value;
            const count = document.getElementById('questionCount').value;

            if (!apiKey) {
                alert("Bitte erst den OpenAI API Key oben eingeben!");
                return;
            }
            if (!topic) {
                alert("Bitte erst ein Thema eingeben!");
                return;
            }

            const btn = document.querySelector('button[onclick="generateAIQuestions()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Denke nach...';
            btn.disabled = true;

            setTimeout(() => {
                const prompts = [
                    `Was genau verstehen Sie unter ${topic}?`,
                    `Welche Erfahrungen haben Sie bereits mit ${topic} gemacht?`,
                    `Können Sie ein Beispiel für ein Problem im Bereich ${topic} nennen?`,
                    `Wie würden Sie einem Laien erklären, warum ${topic} wichtig ist?`,
                    `Was ist Ihre persönliche Meinung zur Zukunft von ${topic}?`,
                    `Welche Rolle spielt ${role} in diesem Kontext?`
                ];
                
                // Nimm nur so viele Fragen wie gewünscht
                const selected = prompts.slice(0, count);
                selected.forEach(q => addQuestion(q));
                
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 1000);
        }

        function generateStudentLink() {
            const questions = Array.from(document.querySelectorAll('.question-input')).map(input => input.value).filter(v => v.trim() !== "");
            
            if(questions.length === 0) {
                alert("Bitte mindestens eine Frage hinzufügen!");
                return;
            }

            const config = {
                // KI Settings
                model: document.getElementById('aiModel').value === 'custom' ? document.getElementById('customModelName').value : document.getElementById('aiModel').value,
                apiKey: document.getElementById('apiKey').value,
                
                // Audio Settings
                audioEngine: document.getElementById('audioEngine').value,
                openaiVoice: document.getElementById('openaiVoice').value,
                elevenApiKey: document.getElementById('elevenApiKey').value,
                elevenVoiceId: document.getElementById('elevenVoiceId').value,

                // Content
                topic: document.getElementById('topic').value,
                role: document.getElementById('roleDesc').value,
                level: document.getElementById('level').value,
                intro: document.getElementById('introText').value,
                questions: questions,
                
                // Lists & Arrays
                vocab: document.getElementById('vocabList').value.split(',').map(s => s.trim()).filter(s => s),
                scaffolding: document.getElementById('scaffoldList').value.split('\n').map(s => s.trim()).filter(s => s),

                // UX Settings
                view: document.getElementById('studentViewMode').value,
                timer: document.getElementById('questionTimer').value,
                gamification: document.getElementById('gamificationEnabled').checked,
                followUp: document.getElementById('aiFollowUp').checked
            };

            // Encode Config (Base64)
            const jsonString = JSON.stringify(config);
            const encodedConfig = btoa(unescape(encodeURIComponent(jsonString))); 
            
            // Link erstellen
            const url = `${window.location.origin}/student.html?config=${encodedConfig}`;
            
            const linkInput = document.getElementById('studentLink');
            linkInput.value = url;
            document.getElementById('openLinkBtn').href = url;
            
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
        }

        function copyLink() {
            const copyText = document.getElementById("studentLink");
            copyText.select();
            copyText.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(copyText.value);
            alert("✅ Link kopiert!");
        }
    </script>
</body>
</html>
