<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - Lehrer Dashboard (Premium)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .section-card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 1.5rem; }
        .input-premium { border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.75rem; width: 100%; transition: all 0.2s; }
        .input-premium:focus { border-color: #4F46E5; ring: 2px solid #4F46E5; outline: none; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-4xl mx-auto">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">AI Tutor <span class="text-indigo-600">Pro</span></h1>
                <p class="text-gray-500">Erstellen Sie eine maßgeschneiderte Lernsitzung.</p>
            </div>
            <div class="bg-indigo-100 text-indigo-800 px-4 py-2 rounded-full font-medium text-sm">
                <i class="fas fa-crown mr-2"></i>Premium Teacher Mode
            </div>
        </div>

        <!-- 1. KI Konfiguration -->
        <div class="section-card border-l-4 border-indigo-500">
            <h2 class="text-xl font-bold mb-4 flex items-center"><i class="fas fa-microchip w-8"></i> KI Engine & Modell</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Modell Auswahl</label>
                    <select id="aiModel" class="input-premium bg-gray-50" onchange="toggleCustomModel()">
                        <option value="gpt-4o">GPT-4o (Standard)</option>
                        <option value="gpt-4-turbo">GPT-4 Turbo</option>
                        <option value="custom">Benutzerdefiniert...</option>
                    </select>
                </div>
                <div id="customModelField" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Modell Name (z.B. gpt-5-preview)</label>
                    <input type="text" id="customModelName" class="input-premium" placeholder="Modell ID eingeben">
                </div>
            </div>
            <div class="mt-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">API Key (OpenAI / Custom)</label>
                <div class="flex gap-2">
                    <input type="password" id="apiKey" class="input-premium" placeholder="sk-...">
                    <button onclick="testConnection()" class="bg-gray-800 text-white px-4 py-2 rounded-lg hover:bg-gray-900 whitespace-nowrap">
                        <i class="fas fa-plug mr-2"></i>Verbindung prüfen
                    </button>
                </div>
                <p id="connectionStatus" class="text-sm mt-2 hidden"></p>
            </div>
        </div>

        <!-- 2. Szenario & Begrüßung -->
        <div class="section-card">
            <h2 class="text-xl font-bold mb-4 flex items-center"><i class="fas fa-theater-masks w-8"></i> Szenario & Intro</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Thema</label>
                    <input type="text" id="topic" class="input-premium" placeholder="z.B. Gehaltsverhandlung">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Tonalität (KI Persona)</label>
                    <select id="tone" class="input-premium">
                        <option value="neutral">Neutral & Sachlich</option>
                        <option value="encouraging">Ermutigender Coach</option>
                        <option value="strict">Strenge Prüferin</option>
                        <option value="skeptical">Skeptischer Geschäftspartner</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Begrüßungstext (Das Erste, was der Schüler hört)</label>
                <textarea id="introText" rows="2" class="input-premium" placeholder="Hallo! Heute üben wir...">Hallo! Ich bin dein AI Tutor. Wir üben heute das Thema Gehaltsverhandlung. Sage 'Bereit', wenn wir starten können.</textarea>
            </div>
        </div>

        <!-- 3. Fragen Generator -->
        <div class="section-card">
            <h2 class="text-xl font-bold mb-4 flex items-center"><i class="fas fa-list-ol w-8"></i> Fragen (Max. 10)</h2>
            <div id="questionsContainer" class="space-y-3 mb-4">
                <!-- Fragen werden hier generiert -->
            </div>
            <div class="flex gap-2">
                <button onclick="addQuestion()" class="text-indigo-600 font-medium hover:underline text-sm"><i class="fas fa-plus mr-1"></i> Frage hinzufügen</button>
            </div>
        </div>

        <!-- 4. Wortschatz & Steuerung -->
        <div class="section-card">
            <h2 class="text-xl font-bold mb-4 flex items-center"><i class="fas fa-sliders-h w-8"></i> Steuerung & Schwierigkeit</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Links: Vokabeln -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Pflichtvokabeln (Kommagetrennt)</label>
                    <textarea id="vocabList" rows="3" class="input-premium" placeholder="Nachhaltigkeit, Effizienz, Synergie..."></textarea>
                </div>

                <!-- Rechts: Settings -->
                <div class="space-y-4">
                     <!-- Interaktions-Modus -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Antwort-Modus (Mikrofon)</label>
                        <select id="interactionMode" class="input-premium">
                            <option value="manual">Manuell (Start/Stop Knopf) - Stressfrei</option>
                            <option value="auto">Auto (Voice Detection) - Fließend</option>
                        </select>
                    </div>

                    <!-- Schüler Ansicht -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Schüler Ansicht (Schwierigkeit)</label>
                        <select id="studentViewMode" class="input-premium">
                            <option value="learning">Lern-Modus (Zeigt Vokabeln & Tipps)</option>
                            <option value="exam">Prüfungs-Modus (Leerer Screen)</option>
                        </select>
                    </div>

                    <!-- KI Sprechtempo -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">KI Sprechtempo (0.8x - 1.2x)</label>
                        <input type="range" id="speechRate" min="0.8" max="1.2" step="0.1" value="1.0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                        <div class="flex justify-between text-xs text-gray-500">
                            <span>Langsam (A2)</span>
                            <span>Schnell (C1)</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action -->
        <button onclick="generateStudentLink()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:scale-[1.01] flex justify-center items-center text-lg">
            <i class="fas fa-link mr-3"></i> Schüler-App Link generieren
        </button>

        <div id="resultArea" class="hidden mt-6 bg-green-50 p-4 rounded-lg flex justify-between items-center border border-green-200">
            <a id="studentLink" href="#" target="_blank" class="text-green-800 font-mono underline truncate mr-4">...</a>
            <button onclick="copyLink()" class="bg-white text-gray-700 px-3 py-1 rounded shadow text-sm font-medium hover:bg-gray-50">Kopieren</button>
        </div>

    </div>

    <script>
        // Initiale Frage
        addQuestion("Erzählen Sie mir etwas über Ihren letzten Job.");

        function toggleCustomModel() {
            const select = document.getElementById('aiModel');
            const customField = document.getElementById('customModelField');
            if(select.value === 'custom') {
                customField.classList.remove('hidden');
            } else {
                customField.classList.add('hidden');
            }
        }

        function testConnection() {
            const status = document.getElementById('connectionStatus');
            status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Prüfe...';
            status.className = 'text-sm mt-2 text-gray-600 block';
            setTimeout(() => {
                status.innerHTML = '<i class="fas fa-check-circle"></i> Verbindung erfolgreich! (Modell bereit)';
                status.className = 'text-sm mt-2 text-green-600 block font-medium';
            }, 1000);
        }

        function addQuestion(text = "") {
            const container = document.getElementById('questionsContainer');
            const id = Date.now();
            const html = `
                <div class="flex gap-2 items-center" id="q-${id}">
                    <span class="text-gray-400 font-mono text-sm">Q:</span>
                    <input type="text" value="${text}" class="question-input flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none" placeholder="Frage eingeben...">
                    <button onclick="removeQuestion('q-${id}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                    <button class="text-gray-400 hover:text-gray-600 cursor-move"><i class="fas fa-grip-lines"></i></button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }

        function removeQuestion(id) {
            document.getElementById(id).remove();
        }

        function generateStudentLink() {
            const questions = Array.from(document.querySelectorAll('.question-input')).map(input => input.value).filter(v => v.trim() !== "");
            
            const config = {
                model: document.getElementById('aiModel').value === 'custom' ? document.getElementById('customModelName').value : document.getElementById('aiModel').value,
                apiKey: document.getElementById('apiKey').value, 
                topic: document.getElementById('topic').value,
                tone: document.getElementById('tone').value,
                intro: document.getElementById('introText').value,
                questions: questions,
                vocab: document.getElementById('vocabList').value.split(',').map(s => s.trim()).filter(s => s),
                mode: document.getElementById('interactionMode').value, 
                view: document.getElementById('studentViewMode').value, 
                speed: document.getElementById('speechRate').value
            };

            const jsonString = JSON.stringify(config);
            const encodedConfig = btoa(unescape(encodeURIComponent(jsonString))); 
            const url = `${window.location.origin}/student.html?config=${encodedConfig}`;
            
            const linkElem = document.getElementById('studentLink');
            linkElem.href = url;
            linkElem.textContent = url;
            document.getElementById('resultArea').classList.remove('hidden');
        }

        function copyLink() {
            const url = document.getElementById('studentLink').href;
            navigator.clipboard.writeText(url);
            alert("Link kopiert!");
        }
    </script>
</body>
</html>
