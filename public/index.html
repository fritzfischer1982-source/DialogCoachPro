<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - Lehrer Dashboard (Secure V3)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; padding-bottom: 80px; }
        .section-card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 1.5rem; transition: transform 0.2s; }
        .input-premium { border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.75rem; width: 100%; transition: all 0.2s; }
        .input-premium:focus { border-color: #4F46E5; ring: 2px solid #4F46E5; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-8 bg-[#f3f4f6] py-4 border-b border-gray-200">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">DialogCoach <span class="text-indigo-600">Enterprise</span></h1>
                <p class="text-gray-500 text-sm">Sicherer Server-Modus aktiv.</p>
            </div>
            <div class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide border border-green-200">
                <i class="fas fa-lock mr-1"></i> Secure Backend
            </div>
        </div>

        <form id="configForm" onsubmit="event.preventDefault(); generateStudentLink();">

        <!-- 1. Szenario (Kein API Key Feld mehr nötig!) -->
        <div class="section-card border-l-4 border-indigo-500">
            <h2 class="text-xl font-bold mb-4 flex items-center text-gray-800"><i class="fas fa-theater-masks w-8 text-pink-500"></i> Szenario & Rolle</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Thema der Stunde</label>
                    <input type="text" id="topic" class="input-premium" placeholder="z.B. Hotelbuchung" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Rolle des Gesprächspartners</label>
                    <input type="text" id="roleDesc" class="input-premium" placeholder="z.B. Genervter Rezeptionist..." required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Niveau</label>
                    <select id="level" class="input-premium">
                        <option value="A1">A1 (Anfänger)</option>
                        <option value="A2">A2 (Grundlagen)</option>
                        <option value="B1">B1 (Mittelstufe)</option>
                        <option value="B2">B2 (Fortgeschritten)</option>
                        <option value="C1">C1 (Fachkundig)</option>
                        <option value="C2">C2 (Muttersprachler)</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Intro-Text (Wird beim Start vorgelesen)</label>
                <textarea id="introText" rows="2" class="input-premium" placeholder="Begrüßungstext...">Hallo! Ich bin dein Coach. Wir üben heute eine Hotelbuchung.</textarea>
            </div>
        </div>

        <!-- 2. Audio Settings -->
        <div class="section-card">
            <h2 class="text-xl font-bold mb-4 flex items-center text-gray-800"><i class="fas fa-volume-up w-8 text-indigo-500"></i> Audio Engine</h2>
            
            <select id="audioEngine" class="input-premium bg-gray-50 font-medium">
                <option value="browser">Browser Native (Kostenlos)</option>
                <!-- ElevenLabs/OpenAI Frontend Keys hier optional, wenn gewünscht -->
            </select>
            <p class="text-xs text-gray-400 mt-2">Hinweis: Fragen-Generierung läuft jetzt über den sicheren Server.</p>
        </div>

        <!-- 3. Fragen Generator (Mit Server-Anbindung) -->
        <div class="section-card">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold flex items-center text-gray-800"><i class="fas fa-list-ol w-8 text-blue-500"></i> Fragen</h2>
            </div>
            
            <div id="questionsContainer" class="space-y-3 mb-4 max-h-[400px] overflow-y-auto pr-2">
                <!-- Fragen erscheinen hier -->
            </div>
            
            <div class="flex gap-4 border-t pt-4 border-gray-100 items-center">
                <button type="button" onclick="addQuestion()" class="text-indigo-600 font-bold hover:text-indigo-800 text-sm flex items-center"><i class="fas fa-plus-circle mr-2"></i> Manuell</button>
                
                <div class="ml-auto flex items-center gap-2">
                    <button type="button" onclick="generateSecureQuestions()" id="genBtn" class="text-white font-bold text-sm flex items-center bg-gray-900 px-4 py-2 rounded-lg hover:bg-black transition shadow-lg">
                        <i class="fas fa-magic mr-2"></i> Via Netlify Server Generieren
                    </button>
                </div>
            </div>
        </div>

        <!-- 4. Lernhilfen -->
        <div class="section-card">
            <h2 class="text-xl font-bold mb-4 flex items-center text-gray-800"><i class="fas fa-life-ring w-8 text-green-500"></i> Hilfen</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Pflichtvokabeln</label>
                    <textarea id="vocabList" rows="3" class="input-premium" placeholder="Zimmer, Frühstück, Reservierung..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Redemittel</label>
                    <textarea id="scaffoldList" rows="3" class="input-premium" placeholder="Ich möchte gerne..."></textarea>
                </div>
            </div>
            
            <div class="mt-4 pt-4 border-t border-gray-100">
                <label class="block text-sm font-bold text-gray-700 mb-2">Ansicht:</label>
                <select id="studentViewMode" class="input-premium bg-white">
                    <option value="learning">Lern-Modus (Sichtbar)</option>
                    <option value="exam">Prüfungs-Modus (Blind)</option>
                </select>
            </div>
        </div>

        <!-- Action -->
        <div class="sticky bottom-4 z-20">
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-xl transition">
                <i class="fas fa-rocket mr-3"></i> Link Erstellen
            </button>
        </div>

        <!-- Result -->
        <div id="resultArea" class="hidden mt-6 bg-green-50 p-6 rounded-xl border border-green-200 shadow-sm">
            <h3 class="text-green-800 font-bold mb-2">Fertig!</h3>
            <div class="flex items-center gap-2 bg-white p-2 rounded border border-green-300">
                <input type="text" id="studentLink" readonly class="flex-1 text-sm text-gray-600 font-mono bg-transparent" value="...">
                <button type="button" onclick="copyLink()" class="bg-green-100 text-green-700 px-4 py-2 rounded font-bold">Kopieren</button>
                <a id="openLinkBtn" href="#" target="_blank" class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded font-bold">Öffnen</a>
            </div>
        </div>

        </form>
    </div>

    <script>
        // Init
        addQuestion("Begrüße mich Situation-gerecht.");

        function addQuestion(text = "") {
            const container = document.getElementById('questionsContainer');
            const id = Date.now();
            const html = `
                <div class="flex gap-2 items-center bg-gray-50 p-2 rounded border border-gray-200 mb-2" id="q-${id}">
                    <span class="text-gray-400 font-mono text-xs w-6">Q:</span>
                    <input type="text" value="${text}" class="question-input flex-1 bg-transparent border-none text-sm focus:ring-0 placeholder-gray-400" placeholder="...">
                    <button type="button" onclick="document.getElementById('q-${id}').remove()" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        // === LEVEL 3 SECURITY: CALL NETLIFY FUNCTION ===
        async function generateSecureQuestions() {
            const topic = document.getElementById('topic').value;
            const role = document.getElementById('roleDesc').value;
            const level = document.getElementById('level').value;

            if (!topic) return alert("Bitte erst ein Thema eingeben!");

            const btn = document.getElementById('genBtn');
            const oldText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Frage Server...';
            btn.disabled = true;

            try {
                // Hier rufen wir DEINEN Server auf
                const response = await fetch('/.netlify/functions/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, role, level })
                });

                if (!response.ok) throw new Error("Server Fehler");

                const data = await response.json();
                
                // Wir nehmen an, die KI antwortet Text oder JSON. 
                // Wir parsen simpel:
                const cleanText = data.result.replace(/```json/g, '').replace(/```/g, '');
                
                // Versuchen als JSON Liste zu lesen
                try {
                    const qArray = JSON.parse(cleanText);
                    if(Array.isArray(qArray)){
                       qArray.forEach(q => addQuestion(typeof q === 'string' ? q : q.question)); 
                    }
                } catch(e) {
                    // Falls KI Text schickt, einfach splitten
                    const lines = cleanText.split('\n').filter(l => l.includes('?'));
                    lines.forEach(l => addQuestion(l.replace(/^- /, '').trim()));
                }

            } catch (err) {
                alert("Fehler: " + err.message + "\nIst der API Key in Netlify hinterlegt?");
            } finally {
                btn.innerHTML = oldText;
                btn.disabled = false;
            }
        }

        function generateStudentLink() {
            const questions = Array.from(document.querySelectorAll('.question-input')).map(input => input.value).filter(v => v.trim() !== "");
            
            if(questions.length === 0) return alert("Keine Fragen!");

            const config = {
                audioEngine: document.getElementById('audioEngine').value,
                topic: document.getElementById('topic').value,
                role: document.getElementById('roleDesc').value,
                level: document.getElementById('level').value,
                intro: document.getElementById('introText').value,
                questions: questions,
                vocab: document.getElementById('vocabList').value.split(',').map(s => s.trim()).filter(s => s),
                scaffolding: document.getElementById('scaffoldList').value.split('\n').map(s => s.trim()).filter(s => s),
                view: document.getElementById('studentViewMode').value
            };

            const encodedConfig = btoa(unescape(encodeURIComponent(JSON.stringify(config)))); 
            const url = `${window.location.origin}/student.html?config=${encodedConfig}`;
            
            document.getElementById('studentLink').value = url;
            document.getElementById('openLinkBtn').href = url;
            document.getElementById('resultArea').classList.remove('hidden');
        }

        function copyLink() {
            const t = document.getElementById("studentLink"); t.select(); navigator.clipboard.writeText(t.value);
        }
    </script>
</body>
</html>
