<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - Lehrer Dashboard (V3 Fixed)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; padding-bottom: 80px; }
        .section-card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 1.5rem; }
        .input-premium { border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.75rem; width: 100%; transition: all 0.2s; }
        .input-premium:focus { border-color: #4F46E5; ring: 2px solid #4F46E5; outline: none; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900">DialogCoach <span class="text-indigo-600">Pro</span></h1>
            <div class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-xs font-bold uppercase">Teacher Mode</div>
        </div>

        <form id="configForm" onsubmit="event.preventDefault(); generateStudentLink();">

        <!-- 1. KI CONFIG -->
        <div class="section-card border-l-4 border-indigo-500">
            <h2 class="text-xl font-bold mb-4 flex items-center"><i class="fas fa-microchip w-8 text-indigo-500"></i> Engine Konfiguration</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-gray-700">KI Modell</label>
                    <select id="aiModel" class="input-premium bg-gray-50 fold-bold" onchange="toggleCustomModel()">
                        <option value="gpt-4o">GPT-4o (Empfohlen)</option>
                        <option value="gpt-4-turbo">GPT-4 Turbo</option>
                        <option value="custom">Benutzerdefiniert...</option> 
                    </select>
                    <div id="customModelField" class="hidden"><input type="text" id="customModelName" class="input-premium" placeholder="Modell ID"></div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">OpenAI API Key <span class="text-red-500">*</span></label>
                        <div class="flex gap-2">
                            <input type="password" id="apiKey" class="input-premium" placeholder="sk-..." required>
                            <button type="button" onclick="testConnection()" class="bg-gray-800 text-white px-4 rounded-lg">Test</button>
                        </div>
                        <p id="connectionStatus" class="text-xs mt-2 h-4"></p>
                    </div>
                </div>
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-gray-700">Audio Engine</label>
                    <select id="audioEngine" class="input-premium bg-gray-50">
                        <option value="browser">Browser Native (Stabil/Kostenlos)</option>
                        <option value="openai">OpenAI HD</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 2. SZENARIO -->
        <div class="section-card">
            <h2 class="text-xl font-bold mb-4 flex items-center"><i class="fas fa-theater-masks w-8 text-pink-500"></i> Szenario</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Thema</label>
                    <input type="text" id="topic" class="input-premium" placeholder="z.B. Energiepolitik" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Rolle</label>
                    <input type="text" id="roleDesc" class="input-premium" placeholder="z.B. Kritischer Journalist" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Niveau</label>
                    <select id="level" class="input-premium">
                        <option value="A1">A1 (Anfänger)</option>
                        <option value="A2">A2 (Grundlagen)</option>
                        <option value="B1">B1 (Mittelstufe)</option>
                        <option value="B2">B2 (Fortgeschritten)</option>
                        <option value="C1">C1 (Fachkundig)</option>
                        <option value="C2">C2 (Muttersprachler)</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Intro-Text (Begrüßung)</label>
                <textarea id="introText" rows="2" class="input-premium">Guten Tag! Ich bin Ihr Coach. Sind Sie bereit für das Interview?</textarea>
            </div>
        </div>

        <!-- 3. FRAGEN GENERATOR (ECHTE KI) -->
        <div class="section-card">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold flex items-center"><i class="fas fa-list-ol w-8 text-blue-500"></i> Fragen</h2>
            </div>
            <div id="questionsContainer" class="space-y-3 mb-4">
                <!-- Fragen Cards -->
            </div>
            <div class="flex gap-4 border-t pt-4 border-gray-100 items-center">
                <button type="button" onclick="addQuestion()" class="text-indigo-600 font-bold text-sm flex items-center"><i class="fas fa-plus-circle mr-2"></i> Manuell</button>
                <div class="ml-auto flex items-center gap-2">
                    <input type="number" id="questionCount" min="1" max="10" value="5" class="w-16 border rounded text-center text-sm">
                    <button type="button" onclick="generateRealAIQuestions()" class="bg-green-100 text-green-700 px-4 py-2 rounded font-bold hover:bg-green-200 transition text-sm flex items-center"><i class="fas fa-magic mr-2"></i> KI Generieren (via API)</button>
                </div>
            </div>
            <div id="aiStatus" class="text-xs text-gray-500 mt-2 text-right"></div>
        </div>

        <!-- 4. SETTINGS -->
        <div class="section-card">
            <h2 class="text-xl font-bold mb-4 flex items-center"><i class="fas fa-sliders-h w-8 text-green-500"></i> Settings</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Pflichtvokabeln</label>
                    <textarea id="vocabList" rows="3" class="input-premium"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Spickzettel (Redemittel)</label>
                    <textarea id="scaffoldList" rows="3" class="input-premium"></textarea>
                </div>
            </div>
            <div class="mt-4 pt-4 border-t border-gray-100 flex items-center gap-6">
                <div class="w-1/2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Zeit pro Frage: <span id="timerValue">60s</span></label>
                    <input type="range" id="questionTimer" min="30" max="300" step="10" value="60" class="w-full" oninput="document.getElementById('timerValue').innerText = this.value + 's'">
                </div>
                <div class="space-y-2">
                    <label class="flex items-center space-x-2"><input type="checkbox" id="gamificationEnabled" checked> <span>Gamification</span></label>
                    <label class="flex items-center space-x-2"><input type="checkbox" id="examMode"> <span>Prüfungsmodus (Blind)</span></label>
                </div>
            </div>
        </div>

        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-xl text-lg">Schüler-Link Generieren</button>

        <div id="resultArea" class="hidden mt-6 bg-green-50 p-6 rounded-xl border border-green-200">
            <h3 class="text-green-800 font-bold mb-2">Fertig!</h3>
            <div class="flex items-center gap-2 bg-white p-2 rounded border border-green-300">
                <input type="text" id="studentLink" readonly class="flex-1 text-sm text-gray-600 font-mono bg-transparent" value="...">
                <button type="button" onclick="copyLink()" class="font-bold text-green-700 px-3">KOPIEREN</button>
                <a id="openLinkBtn" href="#" target="_blank" class="font-bold text-indigo-700 px-3">ÖFFNEN</a>
            </div>
        </div>
        </form>
    </div>

    <script>
        addQuestion("Erzählen Sie mir etwas über sich.");

        function toggleCustomModel() {
            const val = document.getElementById('aiModel').value;
            document.getElementById('customModelField').classList.toggle('hidden', val !== 'custom');
        }

        function testConnection() {
            const key = document.getElementById('apiKey').value;
            const stat = document.getElementById('connectionStatus');
            stat.innerHTML = key.startsWith('sk-') ? '<span class="text-green-600">Format OK</span>' : '<span class="text-red-500">Ungültiger Key</span>';
        }

        function addQuestion(txt = "") {
            const cid = Date.now();
            const html = `<div class="flex gap-2 items-center bg-gray-50 p-2 rounded border" id="q-${cid}"><span class="text-xs text-gray-400">Q:</span><input type="text" value="${txt}" class="question-input flex-1 bg-transparent border-none outline-none"><button onclick="document.getElementById('q-${cid}').remove()" class="text-red-400"><i class="fas fa-trash"></i></button></div>`;
            document.getElementById('questionsContainer').insertAdjacentHTML('beforeend', html);
        }

        // --- REAL AI GENERATION ---
        async function generateRealAIQuestions() {
            const apiKey = document.getElementById('apiKey').value;
            const topic = document.getElementById('topic').value;
            const role = document.getElementById('roleDesc').value;
            const level = document.getElementById('level').value;
            const count = document.getElementById('questionCount').value;
            
            if(!apiKey.startsWith('sk-')) return alert("Bitte gültigen OpenAI Key eingeben!");
            if(!topic) return alert("Bitte Thema eingeben!");

            const status = document.getElementById('aiStatus');
            status.innerText = "Frage OpenAI an... (Bitte warten)";
            
            const prompt = `Erstelle ${count} präzise Interview-Fragen für einen Deutsch-Schüler auf dem Niveau ${level}.
            Thema: ${topic}.
            Deine Rolle: ${role}.
            Die Fragen sollen für das Niveau ${level} angemessen sein (bei B1/B2 argumentativ, bei C1 komplex/hypothetisch).
            Gib NUR ein JSON Array von Strings zurück. Beispiel: ["Frage 1", "Frage 2"]`;

            try {
                const req = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: "gpt-4o",
                        messages: [{role: "system", content: "You are a teacher api."}, {role: "user", content: prompt}],
                        temperature: 0.7
                    })
                });
                const res = await req.json();
                const content = res.choices[0].message.content;
                // Parse JSON (falls Markdown drumherum ist, entfernen)
                const cleanJson = content.replace(/```json|```/g, '').trim();
                const questions = JSON.parse(cleanJson);

                // Einfügen
                document.getElementById('questionsContainer').innerHTML = ""; // Clear old
                questions.forEach(q => addQuestion(q));
                status.innerText = "Erfolgreich generiert!";
            } catch (e) {
                console.error(e);
                status.innerText = "Fehler: " + e.message;
                alert("Fehler bei der KI-Generierung. Prüfe Key & Konsole.");
            }
        }

        function generateStudentLink() {
            const qs = Array.from(document.querySelectorAll('.question-input')).map(i => i.value).filter(v=>v);
            if(qs.length === 0) return alert("Keine Fragen!");

            const config = {
                apiKey: document.getElementById('apiKey').value,
                topic: document.getElementById('topic').value,
                role: document.getElementById('roleDesc').value,
                level: document.getElementById('level').value,
                intro: document.getElementById('introText').value,
                questions: qs,
                vocab: document.getElementById('vocabList').value.split(',').filter(s=>s.trim()),
                scaffolding: document.getElementById('scaffoldList').value.split('\n').filter(s=>s.trim()),
                timer: document.getElementById('questionTimer').value,
                view: document.getElementById('examMode').checked ? 'exam' : 'learning',
                gamification: document.getElementById('gamificationEnabled').checked
            };

            const hash = btoa(unescape(encodeURIComponent(JSON.stringify(config))));
            const url = `${window.location.origin}/student.html?config=${hash}`;
            
            document.getElementById('studentLink').value = url;
            document.getElementById('openLinkBtn').href = url;
            document.getElementById('resultArea').classList.remove('hidden');
        }

        function copyLink() {
            const ct = document.getElementById("studentLink");
            ct.select(); navigator.clipboard.writeText(ct.value);
            alert("Link kopiert!");
        }
    </script>
</body>
</html>
