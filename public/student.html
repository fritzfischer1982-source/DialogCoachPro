<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Coaching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #F8FAFC; color: #334155; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        /* GUI */
        .mic-btn { width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 4px solid white; }
        .mic-idle { background-color: #F1F5F9; color: #94A3B8; border-color: #CBD5E1; }
        .mic-ready { background-color: #4F46E5; color: white; border-color: #818CF8; box-shadow: 0 0 15px rgba(79, 70, 229, 0.3); animation: pop 0.3s; }
        .mic-recording { background-color: #EF4444; color: white; border-color: #FECACA; animation: pulse 1.5s infinite; }
        .mic-blocked { background-color: #E2E8F0; color: #CBD5E1; cursor: not-allowed; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        @keyframes pop { 50% { transform: scale(1.1); } }

        .vocab-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; background: #E2E8F0; font-size: 0.85rem; margin: 2px; color: #475569; }
        .vocab-hit { background: #10B981; color: white; transform: scale(1.1); transition: 0.3s; }

        .image-frame { width: 140px; height: 140px; border-radius: 50%; overflow: hidden; border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 20px; transition: 0.3s; background: #e0e7ff; }
        .speaking { border-color: #4F46E5; transform: scale(1.05); }
    </style>
</head>
<body class="flex flex-col h-full">

    <!-- HEADER -->
    <div class="h-16 bg-white border-b border-gray-200 flex justify-between items-center px-6 shadow-sm z-20">
        <div class="flex items-center gap-3">
            <i class="fas fa-graduation-cap text-indigo-600 text-xl"></i>
            <h1 id="topicDisplay" class="font-bold text-gray-700">Laden...</h1>
        </div>
        <div id="timerDisplay" class="font-mono font-bold text-gray-500 text-xl bg-gray-100 px-3 py-1 rounded">--:--</div>
    </div>

    <!-- MAIN AREA -->
    <div class="flex-1 flex overflow-hidden relative">
        <!-- Links: Avatar & Dialog -->
        <div class="flex-1 flex flex-col items-center justify-center p-6 w-full md:w-3/5">
            <div class="image-frame" id="avatarCircle">
                <img src="avatar.png" onerror="this.src='https://ui-avatars.com/api/?name=Coach&background=E0E7FF&color=4F46E5&size=256'" class="w-full h-full object-cover">
            </div>

            <div class="max-w-xl w-full text-center min-h-[140px] mb-4">
                <h2 id="mainText" class="text-2xl font-medium text-gray-800 leading-relaxed transition-all">...</h2>
                <div id="liveTrans" class="mt-4 text-indigo-600 font-medium italic min-h-[20px]"></div>
            </div>

            <div class="flex flex-col items-center gap-3 z-10">
                <button id="micBtn" class="mic-btn mic-blocked" onclick="toggleMic()" disabled><i class="fas fa-microphone"></i></button>
                <p id="statusLabel" class="text-xs font-bold uppercase text-gray-400 tracking-widest">Warte...</p>
            </div>
        </div>

        <!-- Rechts: Hilfen -->
        <div id="sidePanel" class="hidden md:flex w-2/5 bg-gray-50 border-l border-gray-200 p-6 flex-col overflow-y-auto">
            <h3 class="text-xs font-bold text-gray-400 uppercase mb-4">Hilfsmittel</h3>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-4">
                <h4 class="font-bold text-sm text-gray-700 mb-2">Zielwörter</h4>
                <div id="vocabList"></div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <h4 class="font-bold text-sm text-gray-700 mb-2">Tipps</h4>
                <ul id="scaffoldList" class="text-sm text-gray-600 space-y-2 list-disc pl-4"></ul>
            </div>
        </div>
    </div>

    <!-- START SCREEN (Fix für Audio) -->
    <div id="startScreen" class="absolute inset-0 bg-white/95 backdrop-blur z-50 flex flex-col items-center justify-center p-6">
        <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 text-3xl mb-6">
            <i class="fas fa-play"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Willkommen</h1>
        <p class="text-gray-500 mb-8">Klicke Start, um das Audio zu aktivieren.</p>
        <button onclick="startSession()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-4 rounded-xl font-bold text-xl shadow-lg transition transform hover:scale-105">
            Training Starten
        </button>
    </div>

    <script>
        // === STATE ===
        let config = {};
        let state = { idx: 0, recording: false, speaking: false, log: [], timer: null, time: 0 };
        let recognition = null;

        // === INIT ===
        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            if(p.get('config')) {
                config = JSON.parse(decodeURIComponent(escape(atob(p.get('config')))));
                renderUI();
            }
        };

        function renderUI() {
            document.getElementById('topicDisplay').innerText = config.topic || "Coaching";
            
            if(config.view === 'learning') {
                document.getElementById('sidePanel').classList.remove('hidden');
                document.getElementById('sidePanel').classList.add('flex');
                
                let vBox = document.getElementById('vocabList');
                (config.vocab||[]).forEach(w => {
                    vBox.innerHTML += `<span class="vocab-tag" id="v-${w.toLowerCase().replace(/\W/g,'')}">${w}</span>`;
                });
                let sBox = document.getElementById('scaffoldList');
                (config.scaffolding||[]).forEach(s => sBox.innerHTML += `<li>${s}</li>`);
            } else {
                document.getElementById('sidePanel').remove();
                document.querySelector('.md\\:w-3\\/5').classList.remove('md:w-3/5');
            }
        }

        // === START LOGIC ===
        function startSession() {
            // 1. UI Clean
            document.getElementById('startScreen').style.display = 'none';
            
            // 2. Init Mic (Permission Prompt)
            if('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'de-DE';
                
                recognition.onresult = (e) => {
                    let txt = "";
                    for(let i=e.resultIndex; i<e.results.length; ++i) txt += e.results[i][0].transcript;
                    document.getElementById('liveTrans').innerText = txt;
                    // Gamification
                    if(config.view==='learning') {
                        (config.vocab||[]).forEach(w => {
                            if(txt.toLowerCase().includes(w.toLowerCase())) {
                                let el = document.getElementById(`v-${w.toLowerCase().replace(/\W/g,'')}`);
                                if(el) el.classList.add('vocab-hit');
                            }
                        });
                    }
                };
                
                // Dummy Start um Permission zu holen
                recognition.start();
                setTimeout(() => { recognition.stop(); }, 100);
            }

            // 3. Play Intro
            document.getElementById('mainText').innerText = "Willkommen";
            speak(config.intro, () => {
                nextQuestion();
            });
        }

        // === FLOW ===
        function nextQuestion() {
            if(state.idx >= config.questions.length) return finish();

            let q = config.questions[state.idx];
            state.log.push({role:"Coach", text: q});

            // 1. Text SOFORT anzeigen
            if(config.view === 'learning') {
                document.getElementById('mainText').innerText = q;
            } else {
                document.getElementById('mainText').innerText = "Hören Sie zu...";
            }
            
            // 2. Buttons sperren
            setMicState('blocked', "Coach spricht...");
            document.getElementById('liveTrans').innerText = "";

            // 3. Audio Starten
            speak(q, () => {
                // 4. Wenn fertig -> User Mode
                if(config.view !== 'learning') document.getElementById('mainText').innerText = "Jetzt sprechen...";
                setMicState('ready', "Tippen zum Aufnehmen");
                startTimer(config.timer || 60);
            });

            state.idx++;
        }

        function toggleMic() {
            if(state.recording) {
                // STOP
                state.recording = false;
                try { recognition.stop(); } catch(e){}
                clearInterval(state.timer);
                
                let ans = document.getElementById('liveTrans').innerText.trim();
                if(!ans) ans = "[Audio]";
                state.log.push({role:"Student", text: ans});
                
                setMicState('blocked', "Gespeichert.");
                setTimeout(nextQuestion, 1000); // Kurze Pause
            } else {
                // START
                state.recording = true;
                try { recognition.start(); } catch(e){}
                setMicState('recording', "Aufnahme läuft... (Klick Stop)");
            }
        }

        // === HELPERS ===
        function speak(txt, cb) {
            window.speechSynthesis.cancel();
            document.getElementById('avatarCircle').classList.add('speaking');
            
            let u = new SpeechSynthesisUtterance(txt);
            u.lang = 'de-DE';
            u.rate = 1.0;
            
            u.onend = () => {
                document.getElementById('avatarCircle').classList.remove('speaking');
                if(cb) cb();
            };
            // Fallback falls onend stirbt (Chrome bug)
            setTimeout(() => {
                if(window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                    if(cb) cb();
                }
            }, (txt.length * 80) + 2000);

            window.speechSynthesis.speak(u);
        }

        function setMicState(mode, label) {
            let btn = document.getElementById('micBtn');
            btn.className = `mic-btn mic-${mode}`;
            btn.disabled = (mode === 'blocked');
            document.getElementById('statusLabel').innerText = label;
        }

        function startTimer(sec) {
            state.time = parseInt(sec);
            clearInterval(state.timer);
            
            let display = document.getElementById('timerDisplay');
            
            state.timer = setInterval(() => {
                if(!state.recording) { // Nur runterzählen wenn NICHT aufgenommen wird? Oder immer?
                    // Übliche Logik: Timer läuft für Antwortzeit.
                    state.time--;
                    let m = Math.floor(state.time/60);
                    let s = state.time%60;
                    display.innerText = `${m}:${s.toString().padStart(2,'0')}`;
                    
                    if(state.time <= 0) {
                        clearInterval(state.timer);
                        if(state.recording) toggleMic(); // Auto-Stop bei 0
                    }
                }
            }, 1000);
        }

        function finish() {
            document.getElementById('mainText').innerText = "Training Beendet!";
            document.getElementById('micBtn').style.display='none';
            document.getElementById('statusLabel').innerText = "Erstelle Protokoll...";
            
            // Markdown Download
            let md = `# Protokoll: ${config.topic}\n\n`;
            state.log.forEach(l => md += `**${l.role}:** ${l.text}\n\n`);
            md += `\n---\n### NotebookLM Befehl:\nAnalysiere dieses Gespräch auf Fehler und Stil.`;
            
            let blob = new Blob([md], {type:'text/markdown'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Session_${Date.now()}.md`;
            document.body.appendChild(a);
            a.click();
        }
    </script>
</body>
</html>
