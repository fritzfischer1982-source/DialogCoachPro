<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Online Coaching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #0F172A; color: white; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        /* Mikrofon Button Styles */
        .mic-btn { width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .mic-active { background-color: #EF4444; box-shadow: 0 0 30px #EF4444; animation: pulse 1.5s infinite; transform: scale(1.1); }
        .mic-inactive { background-color: #334155; }
        .mic-inactive:hover { background-color: #475569; transform: translateY(-2px); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* Animationen */
        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Gamification Highlight */
        .vocab-hit { background-color: #10B981 !important; color: white !important; border-color: #059669 !important; transform: scale(1.1); box-shadow: 0 0 15px #10B981; transition: all 0.3s; font-weight: bold; }
        
        /* Avatar Styling */
        .coach-avatar { object-fit: cover; width: 100%; height: 100%; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-full">

    <!-- SIDEBAR (Nur sichtbar im Lern-Modus) -->
    <div id="scaffoldPanel" class="hidden md:w-1/3 w-full bg-slate-900 border-r border-slate-800 p-6 flex-col overflow-y-auto z-20 shadow-xl">
        <h3 class="text-indigo-400 font-bold uppercase tracking-wider text-xs mb-6 flex items-center"><i class="fas fa-book-open mr-2"></i> Deine Lernhilfen</h3>
        
        <!-- Zielvokabeln -->
        <div class="mb-8">
            <h4 class="font-bold mb-3 text-slate-300 text-sm">Verwende diese Begriffe:</h4>
            <div id="vocabDisplay" class="flex flex-wrap gap-2 transition-all">
                <!-- Vokabel Tags kommen hier hin -->
            </div>
            <p class="text-xs text-slate-500 mt-2 italic" id="gamificationHint">Sprich die Wörter laut aus!</p>
        </div>

        <!-- Redemittel / Spickzettel -->
        <div class="mb-6">
            <h4 class="font-bold mb-3 text-slate-300 text-sm">Satzanfänge & Struktur:</h4>
            <ul id="scaffoldDisplay" class="text-sm text-slate-400 space-y-3 pl-2 border-l-2 border-slate-700">
                <!-- Redemittel Items -->
            </ul>
        </div>
    </div>

    <!-- MAIN AREA -->
    <div class="flex-1 flex flex-col h-full relative gradient-bg">
        
        <!-- Top Bar -->
        <div class="p-4 flex justify-between items-center text-slate-400 text-sm border-b border-slate-800/50 bg-slate-900/50 backdrop-blur-sm">
            <div id="topicDisplay" class="font-medium text-slate-200">Wird geladen...</div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                    <i class="fas fa-clock text-indigo-400"></i>
                    <span id="countdownDisplay" class="font-mono text-white">00:00</span>
                </div>
            </div>
        </div>

        <!-- Center Stage -->
        <div class="flex-1 flex flex-col items-center justify-center p-4 md:p-12 text-center relative z-10">
            
            <!-- FOTO / AVATAR UPDATE -->
            <!-- Zeigt avatar.png an. Wenn nicht vorhanden, Fallback auf Icon -->
            <div class="mb-10 relative group">
                <div class="w-32 h-32 md:w-44 md:h-44 rounded-full overflow-hidden border-4 border-slate-700 shadow-2xl transition-transform duration-500 relative z-20 bg-slate-800" id="avatarCircle">
                    <img src="avatar.png" onerror="this.src='https://ui-avatars.com/api/?name=Coach&background=4F46E5&color=fff&size=256'" alt="Dein Coach" class="coach-avatar">
                </div>
                <!-- Speaking Pulse Effect -->
                <div id="speakingPulse" class="absolute inset-0 rounded-full bg-indigo-500 opacity-0 transition-opacity duration-200 blur-2xl -z-10 transform scale-110"></div>
            </div>

            <!-- Frage Text -->
            <div id="dialogArea" class="max-w-2xl min-h-[120px] mb-8">
                <h2 id="mainQuestion" class="text-2xl md:text-3xl font-light leading-relaxed text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400 fade-in">
                    <!-- Frage erscheint hier -->
                </h2>
                <!-- Transkript / Feedback -->
                <p id="subText" class="text-indigo-400 mt-6 text-sm font-mono opacity-80 min-h-[1.5rem]"></p>
            </div>

            <!-- Controls -->
            <div class="flex flex-col items-center w-full max-w-sm">
                
                <!-- Mic Button -->
                <button id="micBtn" class="mic-btn mic-inactive text-white mb-8 group disabled:opacity-50 disabled:cursor-not-allowed" onclick="toggleRecording()" disabled>
                    <i class="fas fa-microphone group-hover:scale-110 transition-transform"></i>
                </button>

                <!-- Status Text & Pause Button -->
                <div class="flex items-center gap-4">
                    <p id="statusText" class="text-slate-500 text-sm font-medium tracking-wide">System wird gestartet...</p>
                    
                    <!-- Anti-Stress Pause Button -->
                    <button id="pauseBtn" onclick="triggerPause()" class="hidden bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-full text-xs transition border border-slate-700 font-bold uppercase tracking-wider">
                        <i class="fas fa-pause mr-2"></i> Pause
                    </button>
                </div>
            </div>
        </div>

        <!-- OVERLAY: Start Screen -->
        <div id="startOverlay" class="absolute inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-8 text-center transition-opacity duration-500">
            <!-- Kleines Logo oben -->
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-indigo-900/50">
                <i class="fas fa-graduation-cap text-2xl text-white"></i>
            </div>
            
            <h1 class="text-3xl md:text-4xl font-bold mb-4 text-white">Willkommen</h1>
            <p class="text-slate-400 mb-8 max-w-md mx-auto leading-relaxed">
                Dein persönliches Coaching beginnt gleich. <br>Bitte sorge für eine ruhige Umgebung.
            </p>
            
            <div id="introLoading" class="mb-6 hidden">
                <i class="fas fa-circle-notch fa-spin text-indigo-500 text-2xl"></i>
                <p class="text-sm text-slate-500 mt-2">Coach bereitet vor...</p>
            </div>

            <button id="startBtn" onclick="initSession()" class="bg-white text-slate-900 hover:bg-indigo-50 px-8 py-4 rounded-xl font-bold text-lg shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 w-full max-w-xs ring-4 ring-indigo-900">
                Session Starten
            </button>
        </div>

    </div>

    <!-- LOGIK -->
    <script>
        let config = {};
        let currentQuestionIndex = 0;
        let isRecording = false;
        let isSpeaking = false;
        let isPaused = false;
        let recognition;
        let conversationLog = []; 
        let questionTimerInterval;
        let timeLeft = 0;
        
        // Setup beim Laden
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const encodedConfig = urlParams.get('config');
            if (encodedConfig) {
                try {
                    config = JSON.parse(decodeURIComponent(escape(atob(encodedConfig))));
                    setupUI();
                } catch (e) {
                    alert("Systemfehler: Konfiguration konnte nicht geladen werden.");
                }
            } else {
                document.getElementById('statusText').innerText = "Keine Konfiguration gefunden.";
            }
        };

        function setupUI() {
            document.getElementById('topicDisplay').textContent = config.topic || "Allgemeines Training";
            
            // Ansicht steuern (Hard/Soft Mode)
            if (config.view === 'learning') {
                // Lernmodus: Zeige Sidebar & Text
                document.getElementById('scaffoldPanel').classList.remove('hidden');
                document.getElementById('scaffoldPanel').classList.add('flex');
                
                // Vokabeln rendern
                const vocabContainer = document.getElementById('vocabDisplay');
                if(config.vocab && config.vocab.length > 0) {
                    config.vocab.forEach(word => {
                        const tag = document.createElement('span');
                        tag.className = "vocab-tag bg-slate-800 text-slate-300 px-3 py-1.5 rounded-lg text-xs border border-slate-700 font-medium transition-all duration-300";
                        tag.textContent = word;
                        tag.id = "vocab-" + word.toLowerCase().replace(/[^a-z0-9]/g, '-');
                        vocabContainer.appendChild(tag);
                    });
                }

                // Spickzettel rendern
                const scaffoldList = document.getElementById('scaffoldDisplay');
                const scaffolds = config.scaffolding || []; 
                scaffolds.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    scaffoldList.appendChild(li);
                });

                if(!config.gamification) {
                    document.getElementById('gamificationHint').style.display = 'none';
                }

            } else {
                // Prüfungsmodus: Text weg, Sidebar weg
                document.getElementById('mainQuestion').classList.add('invisible'); 
                document.getElementById('scaffoldPanel').remove(); 
            }

            // Web Speech API Init
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = true; 
                recognition.interimResults = true;
                recognition.lang = 'de-DE';

                recognition.onresult = (event) => {
                    const transcript = Array.from(event.results).map(r => r[0].transcript).join('');
                    if(config.view === 'learning') document.getElementById('subText').textContent = transcript;
                    
                    // Live Gamification Check
                    checkVocabHit(transcript);
                };
            }
        }

        // Gamification Logic (Grünes Leuchten)
        function checkVocabHit(text) {
            if(!config.gamification || config.view !== 'learning') return;
            
            config.vocab.forEach(word => {
                const cleanWord = word.toLowerCase().trim();
                if(text.toLowerCase().includes(cleanWord)) {
                    // ID muss exakt matchen wie oben generiert
                    const id = "vocab-" + cleanWord.replace(/[^a-z0-9]/g, '-');
                    const tag = document.getElementById(id);
                    if(tag && !tag.classList.contains('vocab-hit')) {
                        tag.classList.add('vocab-hit');
                        tag.innerHTML = '<i class="fas fa-check mr-1"></i> ' + word;
                    }
                }
            });
        }

        // Session Start
        function initSession() {
            const btn = document.getElementById('startBtn');
            const loading = document.getElementById('introLoading');
            
            btn.classList.add('hidden');
            loading.classList.remove('hidden');

            // 1. Zuerst Intro vorlesen
            speakText(config.intro, () => {
                // 2. Overlay ausblenden
                const overlay = document.getElementById('startOverlay');
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    nextQuestion(); // Start Frage 1
                }, 500);
            });
        }

        function nextQuestion() {
            clearInterval(questionTimerInterval);

            if (currentQuestionIndex < config.questions.length) {
                const question = config.questions[currentQuestionIndex];
                
                // Loggen
                conversationLog.push({ speaker: "Coach", text: question });

                // UI Update
                if(config.view === 'learning') {
                    document.getElementById('mainQuestion').textContent = question;
                } else {
                    document.getElementById('mainQuestion').classList.remove('invisible');
                    document.getElementById('mainQuestion').textContent = "Hören Sie genau zu..."; 
                }
                
                document.getElementById('subText').textContent = "";
                document.getElementById('micBtn').disabled = true;

                // Audio Ausgabe
                speakText(question, () => {
                    if(config.view !== 'learning') document.getElementById('mainQuestion').textContent = "..."; // Wieder ausblenden
                    enableInput();
                });
                currentQuestionIndex++;
            } else {
                finishSession();
            }
        }

        // AUDIO ENGINE LOGIK (Standard: Browser)
        function speakText(text, callback) {
            isSpeaking = true;
            document.getElementById('statusText').textContent = "Sprecher aktiv...";
            document.getElementById('speakingPulse').style.opacity = '1';

            // Hier kommt der Code für OpenAI / ElevenLabs Fetch
            // Fallback auf Browser TTS
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "de-DE";
            utterance.rate = 1.0; 
            
            utterance.onend = () => {
                isSpeaking = false;
                document.getElementById('speakingPulse').style.opacity = '0';
                if (callback) callback();
            };
            
            window.speechSynthesis.speak(utterance);
        }

        function enableInput() {
            document.getElementById('statusText').textContent = "Jetzt sprechen";
            document.getElementById('micBtn').disabled = false;
            document.getElementById('pauseBtn').classList.remove('hidden'); 

            // Timer Start aus Config (Default 60s)
            startTimer(config.timer || 60);

            // Automatische Aufnahme starten
            toggleRecording(); 
        }

        function startTimer(seconds) {
            timeLeft = parseInt(seconds);
            const display = document.getElementById('countdownDisplay');
            
            questionTimerInterval = setInterval(() => {
                if(isPaused) return; 

                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if(timeLeft <= 10) display.classList.add('text-red-500');

                if(timeLeft <= 0) {
                    clearInterval(questionTimerInterval);
                    toggleRecording(); // Zeit um -> Aufnahme stopp
                }
                timeLeft--;
            }, 1000);
        }

        // PAUSE BUTTON LOGIK (15s Anti-Stress)
        function triggerPause() {
            if(isPaused) return;
            isPaused = true;
            const btn = document.getElementById('pauseBtn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i class="fas fa-hourglass-half fa-spin"></i> Pause...';
            btn.classList.add('bg-yellow-600', 'text-white');
            
            if(isRecording && recognition) recognition.stop();
            document.getElementById('statusText').innerText = "Pausiert (15s)";

            setTimeout(() => {
                isPaused = false;
                btn.innerHTML = originalText;
                btn.classList.remove('bg-yellow-600', 'text-white');
                document.getElementById('statusText').innerText = "Aufnahme läuft weiter...";
                if(isRecording && recognition) recognition.start();
            }, 15000);
        }

        function toggleRecording() {
            if (isSpeaking) return;

            const btn = document.getElementById('micBtn');
            const status = document.getElementById('statusText');

            if (!isRecording) {
                // START
                isRecording = true;
                btn.classList.add('mic-active');
                btn.classList.remove('mic-inactive');
                
                status.textContent = "Aufnahme läuft... (Tippen zum senden)";
                if(recognition) recognition.start();

            } else {
                // STOP
                isRecording = false;
                btn.classList.remove('mic-active');
                btn.classList.add('mic-inactive');
                document.getElementById('pauseBtn').classList.add('hidden');
                
                if(recognition) recognition.stop();
                clearInterval(questionTimerInterval); 

                // Antwort speichern
                let studentAnswer = document.getElementById('subText').textContent;
                if(studentAnswer.trim() === "") studentAnswer = "[Audio-Antwort]";
                conversationLog.push({ speaker: "Student", text: studentAnswer });

                status.textContent = "Verarbeite Antwort...";
                
                // Simulierte Denkpause
                setTimeout(() => {
                    nextQuestion();
                }, 1000);
            }
        }

        // MONEYMAKER: PROTOKOLL GENERIERUNG (Mit Prompt am Ende!)
        function finishSession() {
            document.getElementById('mainQuestion').textContent = "Training Beendet";
            document.getElementById('subText').textContent = "Das Protokoll wird erstellt...";
            document.getElementById('micBtn').classList.add('hidden');
            document.getElementById('pauseBtn').classList.add('hidden');
            document.getElementById('countdownDisplay').textContent = "FIN";

            generateProtocol();
        }

        function generateProtocol() {
            // Vokabel Analyse für Protokoll
            let vocabCheck = "";
            let fullText = conversationLog.map(e => e.text).join(" ").toLowerCase();
            
            if(config.vocab) {
                config.vocab.forEach(word => {
                    const used = fullText.includes(word.toLowerCase());
                    vocabCheck += `- [${used ? 'x' : ' '}] ${word}\n`;
                });
            }

            // Markdown Content mit integriertem Analyse-Prompt
            let mdContent = `# Protokoll: ${config.topic}\n`;
            mdContent += `Datum: ${new Date().toLocaleDateString()} | Zeit: ${new Date().toLocaleTimeString()} | Level: ${config.level}\n`;
            mdContent += `Rolle KI: ${config.role}\n\n`;
            
            mdContent += `## 1. Vokabel-Check (Zielbegriffe)\n`;
            mdContent += `${vocabCheck}\n\n`;

            mdContent += `## 2. Vollständiges Transkript (Rohdaten)\n`;
            conversationLog.forEach(entry => {
                mdContent += `**${entry.speaker}:** ${entry.text}\n\n`;
            });

            mdContent += `\n---\n`;
            mdContent += `### 🤖 ANWEISUNG FÜR KI-ANALYSE (NotebookLM):\n`;
            mdContent += `Bitte analysiere das obige Transkript präzise auf C1-Niveau:\n`;
            mdContent += `1. **Identifiziere 3 Schlüsselsätze** des Schülers, die grammatikalisch okay, aber stilistisch schwach waren.\n`;
            mdContent += `2. **Erstelle für jeden Satz 3 bessere Alternativen** (Elegant / Professionell / Idiomatisch).\n`;
            mdContent += `3. **Erkläre kurz**, warum die Alternative besser wirkt (z.B. "klingt souveräner").\n`;
            mdContent += `4. **Prüfe die Vokabeln:** Wurden alle Zielbegriffe aus Abschnitt 1 korrekt verwendet? Wenn nein, gib ein Beispiel mit dem fehlenden Begriff.\n`;
            mdContent += `\n---\n*Generiert mit DialogCoach Pro*`;

            const blob = new Blob([mdContent], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const filename = `${new Date().toISOString().slice(0,10)}_${config.topic.replace(/\s+/g, '_')}_Protokoll.md`;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            setTimeout(() => {
                 document.getElementById('subText').innerHTML = `<span class="text-green-400 font-bold">✅ Datei heruntergeladen!</span><br>Bitte sende '${filename}' zur Analyse.`;
            }, 1000);
        }
    </script>
</body>
</html>
