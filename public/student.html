<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprach-Coaching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Light Mode als Standard & Gedeckte Farben */
        body { background-color: #F8FAFC; color: #334155; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        /* Karteikarten Look */
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #E2E8F0; }
        
        /* Mikrofon Button (Heller Style) */
        .mic-btn { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .mic-active { background-color: #EF4444; color: white; box-shadow: 0 0 0 8px rgba(239, 68, 68, 0.2); animation: pulse 1.5s infinite; transform: scale(1.05); }
        .mic-inactive { background-color: #FFFFFF; color: #64748B; border: 2px solid #E2E8F0; }
        .mic-inactive:hover { background-color: #F1F5F9; transform: translateY(-2px); color: #4F46E5; border-color: #4F46E5; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* Große Vokabel-Chips */
        .vocab-tag { font-size: 1rem; padding: 0.5rem 1rem; border-radius: 99px; background: #F1F5F9; color: #475569; border: 1px solid #CBD5E1; transition: all 0.3s; display: inline-block; margin-bottom: 0.5rem; }
        .vocab-hit { background-color: #D1FAE5 !important; color: #065F46 !important; border-color: #34D399 !important; transform: scale(1.05); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* Avatar Styling */
        .coach-avatar { object-fit: cover; width: 100%; height: 100%; transition: transform 0.5s; }
        .speaking .coach-avatar { transform: scale(1.05); }
        .speaking { border-color: #4F46E5 !important; box-shadow: 0 0 0 8px rgba(79, 70, 229, 0.1) !important; }
    </style>
</head>
<body class="flex flex-col h-full">

    <!-- HEADER / TIMER -->
    <div class="h-16 bg-white border-b border-gray-200 flex justify-between items-center px-6 shadow-sm z-20">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center font-bold text-lg">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <div>
                <h1 id="topicDisplay" class="font-bold text-gray-800 leading-tight">Laden...</h1>
                <p class="text-xs text-gray-500">Sprach-Training</p>
            </div>
        </div>
        
        <!-- Großer Timer -->
        <div class="text-3xl font-mono font-bold text-gray-700 bg-gray-50 px-4 py-1 rounded-lg border border-gray-200" id="countdownDisplay">
            00:00
        </div>
    </div>

    <div class="flex-1 flex overflow-hidden">
        
        <!-- MAIN AREA (Links / Oben) -->
        <div class="flex-1 flex flex-col items-center justify-center p-6 relative overflow-y-auto w-full md:w-3/5">
            
            <!-- AVATAR -->
            <div class="mb-8 relative" id="avatarContainer">
                <div class="w-40 h-40 rounded-full overflow-hidden border-4 border-white shadow-xl transition-all duration-300" id="avatarCircle">
                    <img src="avatar.png" onerror="this.src='https://ui-avatars.com/api/?name=Coach&background=F1F5F9&color=64748B&size=256&font-size=0.3'" alt="Dein Coach" class="coach-avatar">
                </div>
            </div>

            <!-- FRAGE TEXT -->
            <div id="dialogArea" class="max-w-2xl w-full text-center mb-8 min-h-[100px]">
                <h2 id="mainQuestion" class="text-2xl md:text-3xl font-medium text-gray-800 leading-snug">
                    <!-- Frage erscheint hier -->
                </h2>
                <!-- Schüler Antwort Preview -->
                <p id="subText" class="text-indigo-600 mt-4 text-lg font-medium min-h-[1.5rem] italic"></p>
            </div>

            <!-- CONTROLS -->
            <div class="flex flex-col items-center gap-4">
                <button id="micBtn" class="mic-btn mic-inactive group disabled:opacity-50 disabled:grayscale" onclick="toggleRecording()" disabled>
                    <i class="fas fa-microphone"></i>
                </button>
                <p id="statusText" class="text-gray-500 font-medium text-sm bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100">Bereit</p>
                
                <button id="pauseBtn" onclick="triggerPause()" class="hidden text-gray-500 hover:text-indigo-600 text-sm font-bold uppercase tracking-wide transition">
                    <i class="fas fa-pause-circle mr-1 text-lg"></i> Pause (15s)
                </button>
            </div>
        </div>

        <!-- SIDEBAR (Rechts / Karteikarten) - Nur im Lern-Modus -->
        <div id="scaffoldPanel" class="hidden md:flex w-2/5 bg-gray-50 border-l border-gray-200 p-8 flex-col overflow-y-auto shadow-inner">
            
            <h3 class="text-gray-400 font-bold uppercase tracking-wider text-xs mb-6">Lernunterstützung</h3>

            <!-- Karte 1: Vokabeln -->
            <div class="card p-6 mb-6">
                <div class="flex items-center gap-2 mb-4 text-indigo-600">
                    <i class="fas fa-tags"></i>
                    <h4 class="font-bold text-lg">Pflichtvokabeln</h4>
                </div>
                <div id="vocabDisplay" class="flex flex-wrap gap-2">
                    <!-- Tags werden hier generiert -->
                </div>
            </div>

            <!-- Karte 2: Redemittel -->
            <div class="card p-6 flex-1">
                <div class="flex items-center gap-2 mb-4 text-teal-600">
                    <i class="fas fa-comment-alt"></i>
                    <h4 class="font-bold text-lg">Formulierungshilfen</h4>
                </div>
                <ul id="scaffoldDisplay" class="space-y-3 text-gray-600 text-lg">
                    <!-- Liste -->
                </ul>
            </div>
        </div>

    </div>


    <!-- OVERLAY: START & PERMISSION CHECK -->
    <div id="startOverlay" class="absolute inset-0 bg-white/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-8 text-center">
        
        <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-indigo-100 mb-6 shadow-xl relative">
            <img src="avatar.png" onerror="this.src='https://ui-avatars.com/api/?name=Coach&background=F1F5F9&color=64748B&size=256'" class="w-full h-full object-cover">
        </div>
        
        <h1 class="text-4xl font-bold mb-2 text-gray-900">Hallo!</h1>
        <p class="text-gray-500 mb-10 text-lg">Dein Coaching wartet auf dich.</p>
        
        <!-- STEP 1: Hardware Check -->
        <div id="hardwareCheck" class="max-w-md w-full bg-white p-6 rounded-2xl shadow-lg border border-gray-100">
            <h3 class="font-bold text-gray-800 mb-4">Einstellungen prüfen:</h3>
            <button onclick="requestPermissions()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold text-lg transition shadow-lg mb-3">
                <i class="fas fa-microphone mr-2"></i> Mikrofon & Audio Aktivieren
            </button>
            <p class="text-xs text-gray-400">Notwendig für den Dialog. Bitte im Browser auf "Zulassen" klicken.</p>
        </div>

        <!-- STEP 2: Start Button (Erscheint erst nach Permisson) -->
        <div id="startSessionDiv" class="hidden animate-fade-in max-w-md w-full">
             <div class="bg-green-50 text-green-700 px-4 py-3 rounded-lg mb-6 text-sm font-medium border border-green-200">
                <i class="fas fa-check-circle mr-2"></i> Technik bereit!
            </div>
            <button onclick="startLoop()" class="w-full bg-gray-900 hover:bg-black text-white py-4 rounded-xl font-bold text-xl transition shadow-xl transform hover:scale-[1.02]">
                Training Starten
            </button>
        </div>

    </div>

    <!-- SCRIPT LOGIK -->
    <script>
        let config = {};
        let currentQuestionIndex = 0;
        let isRecording = false;
        let isSpeaking = false;
        let isPaused = false;
        let recognition;
        let conversationLog = []; 
        let questionTimerInterval;
        let timeLeft = 0;
        let audioContext; 

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const encodedConfig = urlParams.get('config');
            if (encodedConfig) {
                try {
                    config = JSON.parse(decodeURIComponent(escape(atob(encodedConfig))));
                    setupUI();
                } catch (e) {
                    alert("Fehler in Konfiguration.");
                }
            }
        };

        function setupUI() {
            document.getElementById('topicDisplay').textContent = config.topic || "Training";
            
            // View Mode Handling
            if (config.view === 'learning') {
                document.getElementById('scaffoldPanel').classList.remove('hidden');
                document.getElementById('scaffoldPanel').classList.add('flex');
                
                // Vokabeln
                const vocabContainer = document.getElementById('vocabDisplay');
                if(config.vocab) {
                    config.vocab.forEach(word => {
                        const tag = document.createElement('span');
                        tag.className = "vocab-tag";
                        tag.innerText = word;
                        tag.id = "vocab-" + word.toLowerCase().replace(/[^a-z0-9]/g, '-');
                        vocabContainer.appendChild(tag);
                    });
                }
                // Redemittel
                const scaffoldList = document.getElementById('scaffoldDisplay');
                if(config.scaffolding) {
                    config.scaffolding.forEach(item => {
                        const li = document.createElement('li');
                        li.className = "flex items-start gap-2";
                        li.innerHTML = `<i class="fas fa-caret-right mt-1 text-teal-500"></i> <span>${item}</span>`;
                        scaffoldList.appendChild(li);
                    });
                }
            } else {
                // Exam Mode
                document.getElementById('scaffoldPanel').remove();
                document.querySelector('.w-full.md\\:w-3\\/5').classList.remove('md:w-3/5'); // Make main area full width
                document.getElementById('mainQuestion').style.visibility = 'hidden';
            }
        }

        // 1. ZUGRIFF PRÜFEN (Der "Knotenlöser")
        async function requestPermissions() {
            try {
                // Audio Context unlocken (Für iOS wichtig)
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                await audioContext.resume();

                // Mikrofon anfragen
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Speech Recognition Setup (erst jetzt!)
                if ('webkitSpeechRecognition' in window) {
                    recognition = new webkitSpeechRecognition();
                    recognition.continuous = true; 
                    recognition.interimResults = true;
                    recognition.lang = 'de-DE';
                    
                    recognition.onresult = (event) => {
                        const transcript = Array.from(event.results).map(r => r[0].transcript).join('');
                        if(config.view === 'learning') document.getElementById('subText').textContent = transcript;
                        checkVocabHit(transcript);
                    };
                }

                // UI Update
                document.getElementById('hardwareCheck').classList.add('hidden');
                document.getElementById('startSessionDiv').classList.remove('hidden');

            } catch (err) {
                alert("Bitte erlaube den Mikrofon-Zugriff, sonst funktioniert die App nicht!");
                console.error(err);
            }
        }

        // 2. START LOOP (Mit Intro)
        function startLoop() {
            // Overlay ausblenden
            const overlay = document.getElementById('startOverlay');
            overlay.style.transition = "opacity 0.5s";
            overlay.style.opacity = "0";
            setTimeout(() => overlay.classList.add('hidden'), 500);

            // Intro vorlesen
            speakText(config.intro, () => {
                nextQuestion();
            });
        }

        function checkVocabHit(text) {
             if(!config.gamification || config.view !== 'learning') return;
             // ... Logik wie gehabt ...
             config.vocab.forEach(word => {
                const cleanWord = word.toLowerCase().trim();
                if(text.toLowerCase().includes(cleanWord)) {
                    const id = "vocab-" + cleanWord.replace(/[^a-z0-9]/g, '-');
                    const tag = document.getElementById(id);
                    if(tag && !tag.classList.contains('vocab-hit')) {
                        tag.classList.add('vocab-hit');
                    }
                }
            });
        }

        function nextQuestion() {
            clearInterval(questionTimerInterval);

            if (currentQuestionIndex < config.questions.length) {
                const question = config.questions[currentQuestionIndex];
                
                conversationLog.push({ speaker: "Coach", text: question });

                // UI Text
                if(config.view === 'learning') {
                    document.getElementById('mainQuestion').textContent = question;
                } else {
                    document.getElementById('mainQuestion').style.visibility = 'visible';
                    document.getElementById('mainQuestion').textContent = "Hören Sie zu...";
                }
                
                document.getElementById('subText').textContent = "";
                document.getElementById('micBtn').disabled = true;

                speakText(question, () => {
                    if(config.view !== 'learning') document.getElementById('mainQuestion').innerHTML = "&nbsp;"; 
                    enableInput();
                });
                currentQuestionIndex++;
            } else {
                finishSession();
            }
        }

        function speakText(text, callback) {
            isSpeaking = true;
            document.getElementById('statusText').innerText = "Sprecher aktiv...";
            document.getElementById('avatarCircle').classList.add('speaking');
            
            // TTS Abbruch verhindern
            window.speechSynthesis.cancel(); 

            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "de-DE";
            utterance.rate = 1.0;
            
            utterance.onend = function() {
                isSpeaking = false;
                document.getElementById('avatarCircle').classList.remove('speaking');
                if (callback) callback();
            };
            
            // Fallback Timer, falls TTS hängt (WICHTIG!)
            let hangTimer = setTimeout(() => {
                if(isSpeaking) {
                    console.warn("TTS Timeout - Force next step");
                    window.speechSynthesis.cancel();
                    isSpeaking = false;
                    document.getElementById('avatarCircle').classList.remove('speaking');
                    if(callback) callback();
                }
            }, (text.length * 100) + 3000); // Dynamische Länge + Puffer

            utterance.onend = function() {
                clearTimeout(hangTimer);
                isSpeaking = false;
                document.getElementById('avatarCircle').classList.remove('speaking');
                if (callback) callback();
            };

            window.speechSynthesis.speak(utterance);
        }

        function enableInput() {
            document.getElementById('statusText').textContent = "Sprechen...";
            document.getElementById('micBtn').disabled = false;
            document.getElementById('pauseBtn').classList.remove('hidden'); 
            
            startTimer(config.timer || 60);
            toggleRecording(); // Auto Start
        }

        function startTimer(seconds) {
            timeLeft = parseInt(seconds);
            const display = document.getElementById('countdownDisplay');
            
            // Update immediately
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            questionTimerInterval = setInterval(() => {
                if(isPaused) return; 

                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if(timeLeft <= 10) display.classList.add('text-red-500'); else display.classList.remove('text-red-500');

                if(timeLeft <= 0) {
                    clearInterval(questionTimerInterval);
                    toggleRecording(); 
                }
                timeLeft--;
            }, 1000);
        }
        
        function triggerPause() {
            if(isPaused) return;
            isPaused = true;
            const btn = document.getElementById('pauseBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-hourglass-half fa-spin"></i> Warten...';
            if(recognition) recognition.stop();
            
            setTimeout(() => {
                isPaused = false;
                btn.innerHTML = originalText;
                if(recognition && isRecording) recognition.start();
            }, 15000);
        }

        function toggleRecording() {
            if(isSpeaking) return; 

            const btn = document.getElementById('micBtn');
            const status = document.getElementById('statusText');

            if (!isRecording) {
                // Start
                isRecording = true;
                btn.classList.add('mic-active');
                btn.classList.remove('mic-inactive');
                try { if(recognition) recognition.start(); } catch(e){}

            } else {
                // Stop -> Next
                isRecording = false;
                btn.classList.remove('mic-active');
                btn.classList.add('mic-inactive');
                document.getElementById('pauseBtn').classList.add('hidden');
                
                try { if(recognition) recognition.stop(); } catch(e){}
                clearInterval(questionTimerInterval); 

                let ans = document.getElementById('subText').textContent.trim();
                if(ans === "") ans = "[Audio Antwort]";
                conversationLog.push({ speaker: "Student", text: ans });
                
                status.textContent = "Gespeichert.";
                
                setTimeout(() => nextQuestion(), 800);
            }
        }

        function finishSession() {
            document.getElementById('mainQuestion').textContent = "Fertig!";
            document.getElementById('micBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'none';
            generateProtocol();
        }

        function generateProtocol() {
            let vocabCheck = "";
            let fullText = conversationLog.map(e => e.text).join(" ").toLowerCase();
            
            if(config.vocab) {
                config.vocab.forEach(word => {
                    const used = fullText.includes(word.toLowerCase());
                    vocabCheck += `- [${used ? 'x' : ' '}] ${word}\n`;
                });
            }

            let mdContent = `# Protokoll: ${config.topic}\n`;
            mdContent += `Datum: ${new Date().toLocaleDateString()} | Level: ${config.level}\n\n`;
            
            mdContent += `## 1. Vokabel-Check\n${vocabCheck}\n\n`;

            mdContent += `## 2. Transkript\n`;
            conversationLog.forEach(entry => {
                mdContent += `**${entry.speaker}:** ${entry.text}\n\n`;
            });

            mdContent += `\n---\n### ANWEISUNG FÜR KI-ANALYSE:\n`;
            mdContent += `Bitte analysiere dieses Transkript auf C1-Niveau:\n`;
            mdContent += `1. Korrigiere die 3 schwerwiegendsten Grammatikfehler.\n`;
            mdContent += `2. Formuliere 3 Sätze eleganter/idiomatischer um.\n`;
            mdContent += `3. Gib Feedback, ob die Rolle '${config.role}' angemessen bedient wurde.\n`;

            const blob = new Blob([mdContent], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const filename = `${new Date().toISOString().slice(0,10)}_Protokoll.md`;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            document.getElementById('statusText').innerText = "Protokoll gespeichert.";
        }
    </script>
</body>
</html>
