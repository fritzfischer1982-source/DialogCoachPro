<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprach-Coaching V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #F8FAFC; color: #334155; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        /* Karteikarten Style */
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #E2E8F0; }
        
        /* Mikrofon Button */
        .mic-btn { width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; transition: all 0.2s; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .mic-recording { background-color: #EF4444; color: white; animation: pulse 1.5s infinite; transform: scale(1.05); border: none; }
        .mic-idle { background-color: white; color: #64748B; border: 2px solid #E2E8F0; }
        .mic-idle:hover { border-color: #4F46E5; color: #4F46E5; }
        .mic-disabled { opacity: 0.5; cursor: not-allowed; background-color: #E2E8F0; border-color: #CBD5E1; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* Vokabel Tags */
        .vocab-tag { padding: 0.4rem 0.8rem; border-radius: 99px; background: #F1F5F9; color: #475569; border: 1px solid #CBD5E1; font-size: 0.9rem; margin: 2px; display: inline-block; }
        .vocab-hit { background-color: #D1FAE5 !important; color: #065F46 !important; border-color: #34D399 !important; font-weight: bold; transform: scale(1.05); transition: 0.3s; }
        
        /* Avatar */
        .coach-avatar { object-fit: cover; width: 100%; height: 100%; }
        .speaking-border { border-color: #4F46E5 !important; box-shadow: 0 0 0 6px rgba(79, 70, 229, 0.2) !important; }
    </style>
</head>
<body class="flex flex-col h-full">

    <!-- HEADER -->
    <div class="h-16 bg-white border-b border-gray-200 flex justify-between items-center px-4 md:px-8 shadow-sm z-20">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center font-bold text-lg"><i class="fas fa-graduation-cap"></i></div>
            <div>
                <h1 id="topicDisplay" class="font-bold text-gray-800 leading-tight text-sm md:text-base">Coaching</h1>
            </div>
        </div>
        <div class="text-2xl font-mono font-bold text-gray-700 bg-gray-50 px-3 py-1 rounded border border-gray-200" id="timerDisplay">00:00</div>
    </div>

    <!-- MAIN WRAPPER -->
    <div class="flex-1 flex overflow-hidden relative">
        
        <!-- LINKER BEREICH (Avatar & Chat) -->
        <div class="flex-1 flex flex-col items-center justify-center p-4 relative overflow-y-auto w-full md:w-3/5">
            
            <!-- Avatar -->
            <div class="mb-6 relative">
                <div class="w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-4 border-white shadow-xl transition-all duration-300 bg-gray-200" id="avatarCircle">
                    <img src="avatar.png" onerror="this.src='https://ui-avatars.com/api/?name=Coach&background=E0E7FF&color=4F46E5&size=256'" class="coach-avatar">
                </div>
            </div>

            <!-- Frage & Transkript -->
            <div class="max-w-2xl w-full text-center mb-8 min-h-[140px]">
                <h2 id="questionText" class="text-xl md:text-2xl font-semibold text-gray-800 leading-snug mb-4">
                    <!-- Text kommt hier -->
                </h2>
                <div id="transcriptBox" class="text-indigo-600 text-lg font-medium italic min-h-[2rem] px-4 py-2 rounded-lg bg-indigo-50/50 hidden">
                    <!-- Live Transkript -->
                </div>
            </div>

            <!-- Button Area -->
            <div class="flex flex-col items-center gap-3 z-10">
                <button id="micBtn" class="mic-btn mic-disabled" onclick="handleMicClick()" disabled>
                    <i class="fas fa-microphone"></i>
                </button>
                <p id="statusLabel" class="text-gray-400 text-sm font-medium">Bereit</p>
                <button id="pauseBtn" onclick="togglePause()" class="hidden text-sm text-gray-400 font-bold uppercase hover:text-indigo-600 mt-2"><i class="fas fa-pause mr-1"></i> Pause</button>
            </div>
        </div>

        <!-- RECHTER BEREICH (Lernhilfen) -->
        <div id="sidePanel" class="hidden md:flex w-2/5 bg-gray-50 border-l border-gray-200 p-6 flex-col overflow-y-auto shadow-inner">
            <h3 class="text-gray-400 font-bold uppercase text-xs mb-4">Hilfsmittel</h3>
            
            <div class="card p-5 mb-4">
                <h4 class="font-bold text-gray-700 mb-2 text-sm"><i class="fas fa-tag mr-1 text-indigo-500"></i> Zielwörter</h4>
                <div id="vocabList"></div>
            </div>

            <div class="card p-5 flex-1">
                <h4 class="font-bold text-gray-700 mb-2 text-sm"><i class="fas fa-lightbulb mr-1 text-teal-500"></i> Redemittel</h4>
                <ul id="scaffoldList" class="text-sm text-gray-600 space-y-2"></ul>
            </div>
        </div>

    </div>

    <!-- START OVERLAY (DER "ONE CLICK" FIX) -->
    <div id="overlay" class="absolute inset-0 bg-white/95 backdrop-blur z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-24 h-24 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 text-3xl mb-6 shadow-inner">
            <i class="fas fa-headset"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Willkommen</h1>
        <p class="text-gray-500 mb-8 max-w-sm">Drücke auf Start und erlaube den Mikrofon-Zugriff, um loszulegen.</p>
        
        <button onclick="startTotalSystem()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-4 rounded-xl font-bold text-xl shadow-xl hover:shadow-2xl hover:scale-105 transition transform w-full max-w-xs ring-4 ring-indigo-100">
            <i class="fas fa-play mr-2"></i> Session Starten
        </button>
    </div>

    <!-- LOGIC -->
    <script>
        // GLOBALE VARIABLEN (Wichtig für Stabilität)
        let config = {};
        let recognition = null;
        let isRecording = false;
        let questionIdx = 0;
        let log = [];
        let timer = null;
        let timeLeft = 0;
        let isPaused = false;

        // INIT
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('config');
            if(data) {
                try {
                    config = JSON.parse(decodeURIComponent(escape(atob(data))));
                    renderUI();
                    initSpeechAPI(); // API vorbereiten
                } catch(e) { console.error("Config Error", e); }
            }
        };

        function renderUI() {
            document.getElementById('topicDisplay').innerText = config.topic || "Coaching";
            
            // Lernmodus Setup
            if(config.view === 'learning') {
                document.getElementById('sidePanel').classList.remove('hidden');
                document.getElementById('sidePanel').classList.add('flex');
                
                // Vokabeln
                const vContainer = document.getElementById('vocabList');
                (config.vocab || []).forEach(word => {
                    let s = document.createElement('span');
                    s.className = 'vocab-tag';
                    s.innerText = word;
                    s.id = 'v-' + word.toLowerCase().replace(/[^a-z0-9]/g, '');
                    vContainer.appendChild(s);
                });

                // Spickzettel
                const sContainer = document.getElementById('scaffoldList');
                (config.scaffolding || []).forEach(line => {
                    let li = document.createElement('li');
                    li.innerHTML = `• ${line}`;
                    sContainer.appendChild(li);
                });
            } else {
                // Exam Mode
                document.getElementById('sidePanel').remove();
                document.querySelector('.w-full.md\\:w-3\\/5').classList.remove('md:w-3/5');
            }
        }

        // SPEECH API SETUP (Das Herzstück)
        function initSpeechAPI() {
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = true; 
                recognition.interimResults = true;
                recognition.lang = 'de-DE';

                recognition.onresult = (event) => {
                    let final = '';
                    let interim = '';
                    
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            final += event.results[i][0].transcript;
                        } else {
                            interim += event.results[i][0].transcript;
                        }
                    }

                    // Text anzeigen
                    const textBox = document.getElementById('transcriptBox');
                    textBox.classList.remove('hidden');
                    textBox.innerText = final + interim;

                    // Vokabel Check (Live)
                    if(config.view === 'learning') checkVocab(final + interim);
                };

                recognition.onerror = (e) => {
                    console.error("Speech Error:", e.error);
                    if(e.error === 'not-allowed') alert("Mikrofon Zugriff verweigert! Bitte erlauben.");
                };
            } else {
                alert("Dein Browser unterstützt keine Spracherkennung (Benutze Chrome/Safari).");
            }
        }

        function checkVocab(text) {
            if(!config.vocab) return;
            const lower = text.toLowerCase();
            config.vocab.forEach(w => {
                 let id = 'v-' + w.toLowerCase().replace(/[^a-z0-9]/g, '');
                 let el = document.getElementById(id);
                 if(el && lower.includes(w.toLowerCase())) {
                     el.classList.add('vocab-hit');
                 }
            });
        }

        // --- DER SUPER START (Alles auf einmal) ---
        function startTotalSystem() {
            // 1. UI Aufräumen
            document.getElementById('overlay').style.display = 'none';

            // 2. Hardware anfragen (Triggert Browser Prompt)
            navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                // 3. Wenn OK: Intro abspielen (Browser erlaubt TTS jetzt, weil User geklickt hat!)
                document.getElementById('questionText').innerText = "Willkommen! Hören Sie zu...";
                speak(config.intro, () => {
                    // 4. Dann erste Frage
                    nextQuestion();
                });
            })
            .catch(err => {
                alert("Ohne Mikrofon geht es leider nicht. Bitte Seite neu laden und 'Zulassen' klicken.");
            });
        }

        function nextQuestion() {
            if(questionIdx >= config.questions.length) {
                finishSession();
                return;
            }

            const q = config.questions[questionIdx];
            log.push({ speaker: "Coach", text: q });

            // UI
            if(config.view === 'learning') {
                document.getElementById('questionText').innerText = q;
            } else {
                document.getElementById('questionText').innerText = "Hören Sie zu...";
            }
            
            document.getElementById('transcriptBox').innerText = "";
            document.getElementById('transcriptBox').classList.add('hidden');
            
            // Buttons sperren
            let btn = document.getElementById('micBtn');
            btn.className = 'mic-btn mic-disabled';
            btn.disabled = true;

            speak(q, () => {
                // Wenn fertig gesprochen -> User darf reden
                if(config.view !== 'learning') document.getElementById('questionText').innerText = "Jetzt antworten...";
                enableUserInput();
            });
            
            questionIdx++;
        }

        function speak(text, cb) {
            window.speechSynthesis.cancel(); // Reset
            
            document.getElementById('statusLabel').innerText = "Coach spricht...";
            document.getElementById('avatarCircle').classList.add('speaking-border');

            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'de-DE';
            
            u.onend = () => {
                document.getElementById('avatarCircle').classList.remove('speaking-border');
                if(cb) cb();
            };
            
            // Safety Timeout falls TTS hängt
            setTimeout(() => {
                if(window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                    if(cb) cb(); // Force continue
                }
            }, (text.length * 80) + 2000); 

            window.speechSynthesis.speak(u);
        }

        function enableUserInput() {
            let btn = document.getElementById('micBtn');
            btn.className = 'mic-btn mic-idle';
            btn.disabled = false;
            
            document.getElementById('statusLabel').innerText = "Drücke Mikrofon";
            document.getElementById('pauseBtn').classList.remove('hidden');

            startTimer(config.timer || 60);
        }

        function handleMicClick() {
            if(isRecording) {
                // STOPPEN
                stopRecording();
            } else {
                // STARTEN
                startRecording();
            }
        }

        function startRecording() {
            isRecording = true;
            let btn = document.getElementById('micBtn');
            btn.className = 'mic-btn mic-recording'; // Rot pulsiered
            
            document.getElementById('statusLabel').innerText = "Aufnahme läuft...";
            
            try { recognition.start(); } catch(e) {}
        }

        function stopRecording() {
            isRecording = false;
            let btn = document.getElementById('micBtn');
            btn.className = 'mic-btn mic-disabled'; // Grau werden
            btn.disabled = true;
            
            document.getElementById('statusLabel').innerText = "Gespeichert.";
            
            // Timer Stop
            clearInterval(timer);
            
            try { recognition.stop(); } catch(e) {}

            // Text greifen
            let text = document.getElementById('transcriptBox').innerText;
            if(!text) text = "[Kein Audio erkannt]";
            log.push({ speaker: "Student", text: text });

            // Kurze Pause
            setTimeout(() => {
                nextQuestion();
            }, 1000);
        }

        function startTimer(secs) {
            clearInterval(timer);
            timeLeft = parseInt(secs);
            updateTimerDisp();
            
            timer = setInterval(() => {
                if(!isPaused) {
                    timeLeft--;
                    updateTimerDisp();
                    if(timeLeft <= 0) {
                        if(isRecording) stopRecording(); // Zeit um
                    }
                }
            }, 1000);
        }

        function updateTimerDisp() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timerDisplay').innerText = 
                `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function togglePause() {
            isPaused = !isPaused;
            let btn = document.getElementById('pauseBtn');
            if(isPaused) {
                btn.classList.add('text-indigo-600');
                btn.innerHTML = '<i class="fas fa-play mr-1"></i> Weiter';
                document.getElementById('statusLabel').innerText = "Pausiert";
                if(isRecording) recognition.stop(); // Mic aus während Pause
            } else {
                btn.classList.remove('text-indigo-600');
                btn.innerHTML = '<i class="fas fa-pause mr-1"></i> Pause';
                document.getElementById('statusLabel').innerText = isRecording ? "Aufnahme läuft..." : "Drücke Mikrofon";
                if(isRecording) recognition.start();
            }
        }

        function finishSession() {
            document.getElementById('questionText').innerText = "Training Beendet!";
            document.getElementById('micBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('statusLabel').innerText = "Erstelle Protokoll...";
            
            downloadMarkdown();
        }

        function downloadMarkdown() {
            let md = `# Protokoll: ${config.topic}\n`;
            md += `Datum: ${new Date().toLocaleDateString()}\n\n`;
            
            md += `## Verlauf\n`;
            log.forEach(l => {
                md += `**${l.speaker}:** ${l.text}\n\n`;
            });

            md += `\n---\n### NotebookLM Befehl:\n`;
            md += `Analysiere das Transkript. Finde 3 Fehler und schlage 3 bessere Formulierungen vor.`;

            const blob = new Blob([md], {type: 'text/markdown'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Session_${new Date().toISOString().slice(0,10)}.md`;
            document.body.appendChild(a);
            a.click();
        }
    </script>
</body>
</html>
