<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Coach</title>
    
    <!-- Design & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Modernes, ruhiges Design */
        body { background-color: #F1F5F9; color: #334155; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; }
        
        /* Karten-Layout */
        .glass-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); border: 1px solid #E2E8F0; }
        
        /* Das große Mikrofon */
        .mic-btn { width: 90px; height: 90px; border-radius: 50%; border: none; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .mic-idle { background: #FFFFFF; color: #CBD5E1; border: 2px solid #E2E8F0; }
        .mic-idle:hover { border-color: #4F46E5; color: #4F46E5; transform: translateY(-2px); }
        
        .mic-active { background: #EF4444; color: white; animation: pulse 1.5s infinite; box-shadow: 0 0 0 8px rgba(239, 68, 68, 0.2); }
        .mic-blocked { background: #E2E8F0; color: #94A3B8; cursor: not-allowed; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Avatar */
        .avatar-container { width: 120px; height: 120px; border-radius: 50%; border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); overflow: hidden; margin: 0 auto; background: #E0E7FF; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-speaking { border-color: #4F46E5; box-shadow: 0 0 0 8px rgba(79, 70, 229, 0.2); transition: 0.3s; }

        /* Sidebar Tags */
        .tag { display: inline-block; background: #F8FAFC; padding: 6px 12px; border-radius: 12px; font-size: 0.85rem; color: #475569; border: 1px solid #E2E8F0; margin: 3px; }
        .tag-hit { background: #D1FAE5; color: #065F46; border-color: #34D399; font-weight: bold; }
    </style>
</head>
<body class="flex flex-col h-full">

    <!-- === SCREEN 1: INTRO & SETUP (Das Wichtigste!) === -->
    <div id="screenIntro" class="fixed inset-0 z-50 bg-[#F1F5F9] flex flex-col items-center justify-center p-6 transition-opacity duration-500">
        
        <!-- 1. Dein Avatar -->
        <div class="avatar-container mb-6">
            <img src="avatar.png" onerror="this.src='https://ui-avatars.com/api/?name=Coach&background=4F46E5&color=fff&size=256'" class="avatar-img">
        </div>

        <!-- 2. Die Nachricht (Schriftlich) -->
        <div class="glass-card max-w-md w-full p-8 text-center mb-8 relative">
            <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-indigo-600 text-white px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wider">Nachricht vom Coach</div>
            <h1 class="text-2xl font-bold text-slate-800 mb-4" id="introTopic">Thema wird geladen...</h1>
            <p class="text-slate-600 leading-relaxed text-lg" id="introText">
                Bitte warten, Lernsitzung wird vorbereitet...
            </p>
        </div>

        <!-- 3. Hardware Button -->
        <button onclick="startSession()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-xl shadow-xl text-lg flex items-center gap-3 transition transform hover:scale-105">
            <i class="fas fa-microphone"></i>
            <span>Bereit & Mikrofon Starten</span>
        </button>
        <p class="text-slate-400 text-xs mt-4">Klicken Sie "Zulassen", wenn der Browser fragt.</p>
    </div>


    <!-- === SCREEN 2: MAIN SESSION (Versteckt bis Start) === -->
    <div id="screenSession" class="flex-1 flex overflow-hidden hidden">
        
        <!-- LINKER BEREICH: Dialog -->
        <div class="flex-1 flex flex-col relative w-full md:w-3/5">
            <!-- Header -->
            <div class="h-16 flex items-center justify-between px-6 border-b border-slate-200 bg-white">
                <span class="font-bold text-slate-700"><i class="fas fa-graduation-cap text-indigo-600 mr-2"></i> Coaching</span>
                <span id="timerDisplay" class="font-mono font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded">00:00</span>
            </div>

            <!-- Stage -->
            <div class="flex-1 flex flex-col items-center justify-center p-6 overflow-y-auto">
                <div class="avatar-container mb-8" id="sessionAvatar">
                    <img src="avatar.png" onerror="this.src='https://ui-avatars.com/api/?name=Coach&background=4F46E5&color=fff&size=256'" class="avatar-img">
                </div>

                <div class="text-center w-full max-w-xl">
                    <h2 id="questionText" class="text-2xl font-medium text-slate-800 mb-6 transition-all duration-500">
                        Lädt Frage...
                    </h2>
                    
                    <!-- Hier landet der Text vom Schüler -->
                    <div id="transcriptBox" class="min-h-[60px] p-4 rounded-xl bg-slate-100 border border-slate-200 text-slate-600 italic">
                        ...
                    </div>
                </div>
            </div>

            <!-- Controls Footer -->
            <div class="h-32 bg-white border-t border-slate-200 flex flex-col items-center justify-center relative shadow-lg z-10">
                <button id="micBtn" class="mic-btn mic-idle" onclick="toggleMic()" disabled>
                    <i class="fas fa-microphone"></i>
                </button>
                <div id="statusText" class="text-xs font-bold text-slate-400 uppercase mt-3 tracking-widest">Warten...</div>
            </div>
        </div>

        <!-- RECHTER BEREICH: Hilfen (Nur Lernmodus) -->
        <div id="sidebar" class="hidden md:flex w-2/5 bg-slate-50 border-l border-slate-200 p-8 flex-col overflow-y-auto">
            <h3 class="font-bold text-slate-400 text-xs uppercase mb-4">Lernhilfen</h3>
            
            <div class="bg-white p-5 rounded-xl border border-slate-200 mb-6 shadow-sm">
                <h4 class="font-bold text-slate-700 mb-3"><i class="fas fa-check text-green-500 mr-2"></i> Pflichtvokabeln</h4>
                <div id="vocabList"></div>
            </div>

            <div class="bg-white p-5 rounded-xl border border-slate-200 flex-1 shadow-sm">
                <h4 class="font-bold text-slate-700 mb-3"><i class="fas fa-lightbulb text-yellow-500 mr-2"></i> Tipps</h4>
                <ul id="scaffoldList" class="space-y-2 text-sm text-slate-600"></ul>
            </div>
        </div>
    </div>

    <!-- === LOGIC === -->
    <script>
        // GLOBALS
        let config = {};
        let state = { index: 0, recording: false, log: [], timer: null, seconds: 0 };
        let recognition = null;

        // 1. INIT: Lade Config aus URL
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const raw = params.get('config');
            if(raw) {
                try {
                    config = JSON.parse(decodeURIComponent(escape(atob(raw))));
                    setupIntroScreen();
                } catch(e) {
                    document.body.innerHTML = "<h1 style='padding:50px'>Fehler: Link ist ungültig.</h1>";
                }
            } else {
                document.body.innerHTML = "<h1 style='padding:50px'>Keine Konfiguration gefunden. Bitte über Lehrer-App starten.</h1>";
            }
        };

        function setupIntroScreen() {
            document.getElementById('introTopic').innerText = config.topic || "Coaching Session";
            document.getElementById('introText').innerText = config.intro || "Willkommen. Bitte klicken Sie unten.";
            
            // Lernmodus Sidebar Setup
            if(config.view === 'learning') {
                document.getElementById('sidebar').classList.add('flex');
                document.getElementById('sidebar').classList.remove('hidden');
                
                // Vokabeln rendern
                const vList = document.getElementById('vocabList');
                (config.vocab || []).forEach(w => {
                    let s = document.createElement('span'); s.className = 'tag'; s.innerText = w;
                    s.id = 'v-' + w.toLowerCase().replace(/[^a-z0-9]/g,'');
                    vList.appendChild(s);
                });
                
                // Tipps rendern
                const sList = document.getElementById('scaffoldList');
                (config.scaffolding || []).forEach(t => {
                    let li = document.createElement('li'); li.innerHTML = `• ${t}`; 
                    sList.appendChild(li);
                });
            } else {
                // Prüfungsmodus (Clean)
                document.getElementById('sidebar').remove();
                document.querySelector('.md\\:w-3\\/5').classList.remove('md:w-3/5'); // Volle Breite
            }
        }

        // 2. START: Der "sichere Klick"
        async function startSession() {
            try {
                // A) Mikrofon Erlaubnis holen (Browser Prompt)
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // B) Speech Engine vorbereiten (Chrome braucht das)
                if('webkitSpeechRecognition' in window) {
                    recognition = new webkitSpeechRecognition();
                    recognition.continuous = true;
                    recognition.interimResults = true;
                    recognition.lang = 'de-DE';
                    
                    recognition.onresult = (e) => {
                        let txt = "";
                        for(let i=e.resultIndex; i<e.results.length; ++i) txt += e.results[i][0].transcript;
                        document.getElementById('transcriptBox').innerText = txt;
                        
                        // Gamification Highlight
                        if(config.view === 'learning') checkVocab(txt);
                    };
                } else {
                    alert("Achtung: Dieser Browser unterstützt keine Spracherkennung. Bitte Chrome nutzen.");
                }

                // C) UI Wechseln
                document.getElementById('screenIntro').style.display = 'none';
                document.getElementById('screenSession').classList.remove('hidden');
                document.getElementById('screenSession').classList.add('flex');

                // D) Erste Frage starten (kleine Verzögerung für Übergang)
                setTimeout(nextQuestion, 500);

            } catch(err) {
                alert("Fehler: Mikrofon-Zugriff verweigert. Bitte erlauben Sie den Zugriff oben in der Adressleiste.");
            }
        }

        // 3. GAMELOOP
        function nextQuestion() {
            // Check ob Ende
            if(state.index >= config.questions.length) return finishSession();

            const text = config.questions[state.index];
            state.log.push({ speaker: "Coach", text: text });

            // UI Reset
            document.getElementById('transcriptBox').innerText = "...";
            document.getElementById('statusText').innerText = "COACH SPRICHT...";
            
            // Text anzeigen
            if(config.view === 'learning') {
                document.getElementById('questionText').innerText = text;
            } else {
                document.getElementById('questionText').innerText = "Hören Sie genau zu...";
            }

            // Button sperren
            let btn = document.getElementById('micBtn');
            btn.className = "mic-btn mic-blocked";
            btn.disabled = true;

            // Sprechen (TTS)
            speak(text, () => {
                // Wenn fertig gesprochen:
                btn.className = "mic-btn mic-idle";
                btn.disabled = false;
                document.getElementById('statusText').innerText = "BEREIT ZUM SPRECHEN";
                if(config.view !== 'learning') document.getElementById('questionText').innerText = "Jetzt antworten...";
                
                startTimer(config.timer || 60);
            });

            state.index++;
        }

        // 4. TTS (Reden)
        function speak(text, callback) {
            window.speechSynthesis.cancel(); // Clean start
            document.getElementById('sessionAvatar').classList.add('avatar-speaking');

            let u = new SpeechSynthesisUtterance(text);
            u.lang = 'de-DE';
            u.rate = 1.0;

            u.onend = () => {
                document.getElementById('sessionAvatar').classList.remove('avatar-speaking');
                if(callback) callback();
            };

            // Notfall-Timer falls TTS hängt (WICHTIG!)
            setTimeout(() => {
                if(window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                    if(callback) callback();
                }
            }, (text.length * 100) + 3000);

            window.speechSynthesis.speak(u);
        }

        // 5. MIKROFON STEUERUNG
        function toggleMic() {
            let btn = document.getElementById('micBtn');
            
            if(!state.recording) {
                // START
                state.recording = true;
                btn.className = "mic-btn mic-active"; // Rot pulsierend
                document.getElementById('statusText').innerText = "AUFNAHME LÄUFT... (KLICK ZUM BEENDEN)";
                try { recognition.start(); } catch(e){}
            } else {
                // STOP
                state.recording = false;
                btn.className = "mic-btn mic-blocked";
                btn.disabled = true;
                document.getElementById('statusText').innerText = "GESPEICHERT.";
                
                clearInterval(state.timer);
                try { recognition.stop(); } catch(e){}

                // Speichern Text
                let ans = document.getElementById('transcriptBox').innerText;
                if(ans === "...") ans = "[Keine Antwort erfasst]";
                state.log.push({ speaker: "Student", text: ans });

                // Weiter nach kurzer Pause
                setTimeout(nextQuestion, 1500);
            }
        }

        // 6. HELFER
        function startTimer(seconds) {
            clearInterval(state.timer);
            state.seconds = parseInt(seconds);
            updateTimerDisplay();
            
            state.timer = setInterval(() => {
                state.seconds--;
                updateTimerDisplay();
                if(state.seconds <= 0) {
                    // Zeit abgelaufen -> Auto Stop wenn Aufnahme läuft
                    if(state.recording) toggleMic();
                    else {
                        // Wenn nicht aufgenommen -> direkt weiter (als Timeout)
                        clearInterval(state.timer);
                        alert("Zeit abgelaufen!");
                        nextQuestion();
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            let m = Math.floor(state.seconds / 60);
            let s = state.seconds % 60;
            document.getElementById('timerDisplay').innerText = 
                `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function checkVocab(txt) {
            if(!config.vocab) return;
            let t = txt.toLowerCase();
            config.vocab.forEach(w => {
                let clean = w.toLowerCase().trim();
                let el = document.getElementById('v-' + clean.replace(/[^a-z0-9]/g,''));
                if(el && t.includes(clean)) el.classList.add('tag-hit');
            });
        }

        // 7. ABSCHLUSS & PROTOKOLL MIT PROMPT
        function finishSession() {
            document.getElementById('questionText').innerText = "Training Beendet!";
            document.getElementById('micBtn').style.display = 'none';
            document.getElementById('statusText').innerText = "Erstelle Protokoll...";

            // Markdown bauen
            let md = `# Protokoll: ${config.topic}\n`;
            md += `Datum: ${new Date().toLocaleDateString()} | Level: ${config.level}\n\n`;
            
            md += `## Verlauf\n`;
            state.log.forEach(entry => {
                md += `**${entry.speaker}:** ${entry.text}\n\n`;
            });

            // *** DER NOTEBOOK LM PROMPT ***
            md += `\n---\n`;
            md += `### 🤖 ANWEISUNG FÜR KI-ANALYSE:\n`;
            md += `Bitte fungiere als professioneller Sprach-Coach und analysiere dieses Transkript.\n`;
            md += `1. **Fehler-Analyse:** Identifiziere die 3 gravierendsten Grammatik- oder Ausdrucksfehler des Schülers.\n`;
            md += `2. **Korrektur:** Zeige für jeden Fehler die korrekte Version.\n`;
            md += `3. **Stil-Upgrade:** Nimm 2 korrekte, aber einfache Sätze des Schülers und formuliere sie auf C1-Niveau um (eleganter/idiomatischer).\n`;
            md += `4. **Wortschatz:** Wurden Fachbegriffe zum Thema '${config.topic}' verwendet? Wenn nein, schlage 5 passende Begriffe vor.\n`;

            // Download
            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Session_${new Date().toISOString().slice(0,10)}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            document.getElementById('statusText').innerText = "Datei heruntergeladen.";
        }
    </script>
</body>
</html>
