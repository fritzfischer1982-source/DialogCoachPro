<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DialogCoach Pro | Schüler-Session</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --bg: #F0F4F8;
            --card: #ffffff;
            --text: #2D3748;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        .robot-icon {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        h1 { 
            color: var(--primary); 
            font-size: 1.5rem; 
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .status-text {
            font-size: 0.9rem;
            color: #718096;
            margin-top: 10px;
            height: 20px;
        }

        #mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(74, 144, 226, 0.4);
            margin: 20px 0;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        #mic-button.active {
            background: #EF4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 25px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .chat-display {
            background: #F8FAFC;
            border-radius: 15px;
            padding: 20px;
            margin-top: 25px;
            min-height: 80px;
            border: 1px solid #E2E8F0;
            line-height: 1.5;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="app-container">
    <span class="robot-icon">🤖</span>
    <h1 id="topic-title">Dialog Coach</h1>
    
    <button id="mic-button">🎤</button>
    
    <div id="status" class="status-text">Klicke zum Sprechen</div>
    
    <div class="chat-display" id="chat-output">
        Hallo! Ich bin dein KI-Trainer. Worüber möchtest du heute sprechen?
    </div>
</div>

<script>
    const MIC_BUTTON = document.getElementById('mic-button');
    const STATUS_TEXT = document.getElementById('status');
    const CHAT_OUTPUT = document.getElementById('chat-output');
    const TOPIC_TITLE = document.getElementById('topic-title');

    // Thema aus der URL holen oder Standard setzen
    const urlParams = new URLSearchParams(window.location.search);
    const topic = urlParams.get('topic') || "Allgemeines Training";
    TOPIC_TITLE.innerText = topic;

    let recognition;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'de-DE';

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            sendToAI(transcript);
        };

        recognition.onerror = () => {
            STATUS_TEXT.innerText = "Fehler: Mikrofon nicht erkannt";
            MIC_BUTTON.classList.remove('active');
        };
    }

    MIC_BUTTON.onclick = () => {
        if (!recognition) return alert("Browser nicht unterstützt.");
        MIC_BUTTON.classList.add('active');
        STATUS_TEXT.innerText = "Ich höre zu...";
        recognition.start();
    };

    async function sendToAI(text) {
        STATUS_TEXT.innerText = "KI überlegt...";
        try {
            const response = await fetch('/.netlify/functions/chat1', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, topic: topic })
            });

            const data = await response.json();
            
            // Wichtigster Fix: Wir nehmen, was die KI liefert, egal wie das Feld heißt
            const kiAntwort = data.reply || data.message || data.text || "Ich habe dich verstanden, aber meine Antwort ist leer.";
            
            CHAT_OUTPUT.innerText = kiAntwort;
            STATUS_TEXT.innerText = "Bereit";
        } catch (err) {
            CHAT_OUTPUT.innerText = "Verbindung zur KI fehlgeschlagen.";
            STATUS_TEXT.innerText = "Fehler";
        } finally {
            MIC_BUTTON.classList.remove('active');
        }
    }
</script>

</body>
</html>
