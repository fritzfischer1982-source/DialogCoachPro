<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DialogCoach Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4A90E2; --bg: #F0F4F8; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { background: var(--card); padding: 2.5rem; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 450px; width: 90%; text-align: center; }
        .robot-icon { font-size: 4rem; display: block; margin-bottom: 10px; }
        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 20px; }
        #mic-button { width: 100px; height: 100px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 2.5rem; cursor: pointer; transition: 0.3s; }
        #mic-button.active { background: #EF4444; transform: scale(1.1); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .chat-display { background: #F8FAFC; border-radius: 15px; padding: 20px; margin-top: 25px; border: 1px solid #E2E8F0; min-height: 60px; }
    </style>
</head>
<body>
<div class="app-container">
    <span class="robot-icon">🤖</span>
    <h1 id="topic-title">Lade...</h1>
    <button id="mic-button">🎤</button>
    <div id="status" style="margin-top: 10px; color: #718096;">Bereit</div>
    <div class="chat-display" id="chat-output">Klicke auf das Mikrofon!</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const topic = urlParams.get('topic') || "Allgemeines Training";
    document.getElementById('topic-title').innerText = topic;

    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'de-DE';
        recognition.onresult = (e) => { sendToAI(e.results[0][0].transcript); };
    }

    document.getElementById('mic-button').onclick = () => {
        if (!recognition) return alert("Browser nicht unterstützt");
        document.getElementById('mic-button').classList.add('active');
        document.getElementById('status').innerText = "Ich höre...";
        recognition.start();
    };

    async function sendToAI(text) {
        document.getElementById('mic-button').classList.remove('active');
        document.getElementById('status').innerText = "KI überlegt...";
        try {
            const res = await fetch('/.netlify/functions/chat1', {
                method: 'POST',
                body: JSON.stringify({ message: text, topic: topic })
            });
            const data = await res.json();
            document.getElementById('chat-output').innerText = data.reply;
            document.getElementById('status').innerText = "Bereit";
        } catch (e) {
            document.getElementById('chat-output').innerText = "Fehler!";
        }
    }
</script>
</body>
</html>
