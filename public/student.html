<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DialogCoach Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4A90E2; --bg: #F0F4F8; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { background: var(--card); padding: 2.5rem; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 450px; width: 90%; text-align: center; }
        .robot-icon { font-size: 4rem; display: block; margin-bottom: 10px; }
        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 20px; }
        #mic-button { width: 100px; height: 100px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 2.5rem; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(74,144,226,0.3); }
        #mic-button.active { background: #EF4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .chat-display { background: #F8FAFC; border-radius: 15px; padding: 20px; margin-top: 25px; border: 1px solid #E2E8F0; min-height: 60px; line-height: 1.5; color: #2D3748; }
    </style>
</head>
<body>
<div class="app-container">
    <span class="robot-icon">🤖</span>
    <h1 id="topic-title">Dialog Coach</h1>
    <button id="mic-button">🎤</button>
    <div id="status" style="margin-top: 15px; color: #718096; font-size: 0.9rem;">Bereit</div>
    <div class="chat-display" id="chat-output">Drücke auf das Mikrofon und sag etwas!</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const topic = urlParams.get('topic') || "Allgemeines Training";
    document.getElementById('topic-title').innerText = topic;

    const MIC_BTN = document.getElementById('mic-button');
    const STATUS = document.getElementById('status');
    const OUTPUT = document.getElementById('chat-output');

    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'de-DE';
        recognition.onresult = (e) => { 
            const text = e.results[0][0].transcript;
            sendToAI(text); 
        };
        recognition.onerror = () => {
            STATUS.innerText = "Fehler: Mikrofon nicht erkannt";
            MIC_BTN.classList.remove('active');
        };
    }

    MIC_BTN.onclick = () => {
        if (!recognition) return alert("Browser nicht unterstützt");
        MIC_BTN.classList.add('active');
        STATUS.innerText = "Ich höre zu...";
        recognition.start();
    };

    async function sendToAI(userText) {
        MIC_BTN.classList.remove('active');
        STATUS.innerText = "KI überlegt...";
        OUTPUT.innerText = "...";

        try {
            const res = await fetch('/.netlify/functions/chat1', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userText, topic: topic })
            });
            
            const data = await res.json();
            
            // Nimmt die Antwort, die wir gerade im Log gesehen haben
            OUTPUT.innerText = data.reply || "Ich habe die Antwort erhalten, konnte sie aber nicht anzeigen.";
            STATUS.innerText = "Bereit";
        } catch (e) {
            OUTPUT.innerText = "Verbindungsfehler!";
            STATUS.innerText = "Fehler";
        }
    }
</script>
</body>
</html>
